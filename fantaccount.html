  <style>
    /* Keep all your existing styles here - they're good */
    .account-container {
      max-width: 800px;
      margin: 100px auto;
      padding: 30px;
      background: rgba(20, 30, 50, 0.8);
      border-radius: 20px;
      border: 1px solid rgba(45, 90, 227, 0.4);
      text-align: center;
    }
    
    .account-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .account-tab {
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      padding: 10px 20px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.3s ease;
    }
    
    .account-tab.active {
      color: #ffcc00;
      border-bottom: 2px solid #ffcc00;
    }
    
    .account-tab-content {
      display: none;
    }
    
    .account-tab-content.active {
      display: block;
    }
    
    .account-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      text-align: left;
    }
    
    .account-form input {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(45, 90, 227, 0.4);
      background: rgba(0,0,0,0.3);
      color: white;
      font-size: 14px;
    }
    
    .account-form input:focus {
      outline: none;
      border-color: #ffcc00;
    }
    
    .profile-info {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .profile-avatar {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #2d5ae3, #ffcc00);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 15px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .profile-avatar:hover {
      transform: scale(1.05);
    }
    
    .profile-stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    
    .stat {
      text-align: center;
    }
    
    .stat-number {
      font-size: 24px;
      font-weight: bold;
      color: #ffcc00;
    }
    
    .stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }
    
    .message {
      padding: 10px;
      border-radius: 8px;
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }
    
    .message.error {
      background: rgba(255,0,0,0.2);
      color: #ff6666;
    }
    
    .message.success {
      background: rgba(0,255,0,0.2);
      color: #66ff66;
    }
    
    .logout-btn {
      background: rgba(220, 50, 50, 0.2);
      border-color: rgba(220, 50, 50, 0.5);
      margin-top: 20px;
    }
    
    .logout-btn:hover {
      background: rgba(220, 50, 50, 0.4);
    }
    
    .settings-btn {
      background: rgba(45, 90, 227, 0.3);
      border: 1px solid rgba(45, 90, 227, 0.5);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    
    .settings-btn:hover {
      background: rgba(45, 90, 227, 0.5);
      transform: translateY(-2px);
    }
    
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 20px 0;
    }
    
    /* Achievement styles */
    .achievements-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 15px;
    }
    
    .total-score {
      background: linear-gradient(135deg, rgba(255,204,0,0.2), rgba(255,204,0,0.05));
      border: 1px solid rgba(255,204,0,0.3);
      border-radius: 30px;
      padding: 8px 20px;
      text-align: center;
    }
    
    .total-score .score-number {
      font-size: 28px;
      font-weight: bold;
      color: #ffcc00;
      font-family: 'Orbitron', monospace;
    }
    
    .total-score .score-label {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      margin-left: 8px;
    }
    
    .total-progress {
      flex: 1;
      min-width: 200px;
    }
    
    .total-progress-bar {
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 5px;
    }
    
    .total-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffcc00, #ffaa00);
      width: 0%;
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    
    .total-progress-text {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }
    
    .category-card {
      background: rgba(255,255,255,0.03);
      border-radius: 16px;
      margin-bottom: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
    }
    
    .category-header {
      padding: 15px 20px;
      background: rgba(0,0,0,0.2);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s ease;
    }
    
    .category-header:hover {
      background: rgba(0,0,0,0.3);
    }
    
    .category-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .category-icon {
      font-size: 24px;
    }
    
    .category-name {
      font-size: 16px;
      font-weight: bold;
      font-family: 'Orbitron', monospace;
    }
    
    .category-stats {
      text-align: right;
    }
    
    .category-points {
      font-size: 14px;
      color: #ffcc00;
    }
    
    .category-progress {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }
    
    .category-progress-bar {
      width: 150px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 5px;
      overflow: hidden;
    }
    
    .category-progress-fill {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }
    
    .category-newbie .category-progress-fill { background: #00ff88; }
    .category-beginner .category-progress-fill { background: #2d5ae3; }
    .category-climbing .category-progress-fill { background: #ff8800; }
    .category-difficult .category-progress-fill { background: #ff4444; }
    .category-elite .category-progress-fill { background: #ffcc00; }
    .category-secret .category-progress-fill { background: linear-gradient(90deg, #ff00ff, #00ffff); }
    
    .achievements-list {
      padding: 15px 20px;
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    
    .category-card.open .achievements-list {
      display: flex;
    }
    
    .achievement-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      transition: all 0.2s ease;
    }
    
    .achievement-item.unlocked {
      background: linear-gradient(135deg, rgba(255,204,0,0.1), rgba(255,204,0,0.02));
      border-left: 3px solid #ffcc00;
    }
    
    .achievement-item.locked {
      opacity: 0.7;
    }
    
    .achievement-icon {
      font-size: 32px;
      min-width: 50px;
      text-align: center;
    }
    
    .achievement-info {
      flex: 1;
    }
    
    .achievement-name {
      font-size: 14px;
      font-weight: bold;
      color: white;
    }
    
    .achievement-desc {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }
    
    .achievement-points {
      font-size: 12px;
      color: #ffcc00;
      min-width: 50px;
      text-align: right;
    }
    
    .achievement-item.secret-hidden .achievement-icon {
      filter: blur(4px);
    }
    
    .achievement-item.secret-hidden .achievement-name,
    .achievement-item.secret-hidden .achievement-desc {
      filter: blur(3px);
      user-select: none;
    }
  </style>

  <!-- Account Button -->
  <div class="account-btn-container">
    <button class="account-btn" id="accountBtn" onclick="window.location.href='fantaccount.html'">
      <span class="account-icon">👤</span>
      <span class="account-name" id="accountName">Guest</span>
    </button>
  </div>

  <div class="center">
    <h1>account.</h1>
    <p>manage your fanter profile</p>
    <button class="settings-btn" onclick="window.location.href='index.html'">← back</button>
  </div>

  <div class="account-container">
    <div class="account-tabs">
      <button class="account-tab active" data-tab="profile">profile</button>
      <button class="account-tab" data-tab="achievements">🏆 achievements</button>
      <button class="account-tab" data-tab="login">login</button>
      <button class="account-tab" data-tab="register">register</button>
    </div>

    <!-- Profile Tab -->
    <div id="profileTab" class="account-tab-content active">
      <div id="profileContent">
        <div style="text-align: center; padding: 40px;">loading profile...</div>
      </div>
    </div>

    <!-- Achievements Tab -->
    <div id="achievementsTab" class="account-tab-content">
      <div id="achievementsContent">
        <div style="text-align: center; padding: 40px;">loading achievements...</div>
      </div>
    </div>

    <!-- Login Tab -->
    <div id="loginTab" class="account-tab-content">
      <form id="loginForm" class="account-form">
        <input type="email" id="loginEmail" placeholder="email" required>
        <input type="password" id="loginPassword" placeholder="password" required>
        <button type="submit" class="settings-btn">login</button>
        <div id="loginMessage" class="message"></div>
      </form>
    </div>

    <!-- Register Tab -->
    <div id="registerTab" class="account-tab-content">
      <form id="registerForm" class="account-form">
        <input type="text" id="regUsername" placeholder="username" required>
        <input type="email" id="regEmail" placeholder="email" required>
        <input type="text" id="regDisplayName" placeholder="display name (optional)">
        <input type="password" id="regPassword" placeholder="password" required>
        <input type="password" id="regConfirmPassword" placeholder="confirm password" required>
        <button type="submit" class="settings-btn">register</button>
        <div id="registerMessage" class="message"></div>
      </form>
    </div>
  </div>

          { id: 60, name: "Committed", desc: "Dedication", requirement: "same_game_100", required: 100, icon: "💪", hidden: false, hint: "play the same game 100 times" },
          { id: 61, name: "Top 1 Unemployed", desc: "No life detected", requirement: "total_play_time", required: 50, icon: "🛋️", hidden: false, hint: "play fanter for 50 hours total" },
          { id: 62, name: "Loyal Customer", desc: "Taste tester", requirement: "rate_all_games", required: 1, icon: "⭐", hidden: false, hint: "rate every game on fanter" },
          { id: 63, name: "System Failure", desc: "You broke it", requirement: "crash", required: 1, icon: "💻", hidden: true, hint: "find the hidden crash" }
        ]
      }
    };
    
    // ===== INITIALIZATION =====
    async function initializeApp() {
      // Check for existing session
      const { data: { session } } = await supabase.auth.getSession();
      currentSession = session;
      
      if (session) {
        currentUser = session.user;
        await loadUserData();
        updateUIForAuthState();
      } else {
        // Check localStorage for guest data
        const localUser = localStorage.getItem('fanter_currentUser');
        if (localUser) {
          currentUser = JSON.parse(localUser);
          userProfile = currentUser;
          userAchievements = currentUser.achievements || {};
          userStats = currentUser.stats || userStats;
        }
        updateUIForAuthState();
      }
      
      // Set up auth state listener
      supabase.auth.onAuthStateChange(async (event, session) => {
        currentSession = session;
        currentUser = session?.user || null;
        
        if (session) {
          await loadUserData();
        }
        
        updateUIForAuthState();
        renderCurrentTab();
      });
      
      // Initialize tabs
      setupTabs();
      renderCurrentTab();
    }
    
    async function loadUserData() {
      if (!currentUser) return;
      
      try {
        // Load profile
        const { data: profile } = await supabase
          .from('profiles')
          .select('*')
          .eq('id', currentUser.id)
          .single();
        
        if (profile) {
          userProfile = profile;
        }
        
        // Load achievements
        const { data: achievements } = await supabase
          .from('user_achievements')
          .select('achievement_id, unlocked_at')
          .eq('user_id', currentUser.id);
        
        if (achievements) {
          userAchievements = {};
          achievements.forEach(ach => {
            userAchievements[ach.achievement_id] = true;
          });
        }
        
        // Load stats
        const { data: stats } = await supabase
          .from('user_stats')
          .select('*')
          .eq('user_id', currentUser.id)
          .single();
        
        if (stats) {
          userStats = stats;
        } else {
          // Create initial stats if none exist
          await supabase.from('user_stats').insert({
            user_id: currentUser.id,
            ...userStats
          });
        }
        
        // Update login streak
        await updateLoginStreak();
        
      } catch (error) {
        console.error('Error loading user data:', error);
      }
    }
    
    async function updateLoginStreak() {
      if (!currentUser) return;
      
      const today = new Date().toISOString().split('T')[0];
      const lastLogin = userStats.last_login_date;
      
      if (lastLogin !== today) {
        let newStreak = userStats.login_streak || 0;
        let newDays = (userStats.login_days || 0) + 1;
        
        if (lastLogin) {
          const lastDate = new Date(lastLogin);
          const todayDate = new Date(today);
          const diffDays = Math.floor((todayDate - lastDate) / (1000 * 60 * 60 * 24));
          
          if (diffDays === 1) {
            newStreak += 1;
          } else if (diffDays > 1) {
            newStreak = 1;
          }
        } else {
          newStreak = 1;
        }
        
        userStats.login_streak = newStreak;
        userStats.login_days = newDays;
        userStats.last_login_date = today;
        
        await supabase.from('user_stats').upsert({
          user_id: currentUser.id,
          login_streak: newStreak,
          login_days: newDays,
          last_login_date: today
        });
        
        await checkAchievements();
      }
    }
    
    // ===== AUTHENTICATION =====
    async function handleLogin(email, password) {
      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });
        
        if (error) throw error;
        
        showMessage('loginMessage', 'Login successful!', 'success');
        
        // Redirect or update UI
        setTimeout(() => {
          window.location.reload();
        }, 1000);
        
      } catch (error) {
        showMessage('loginMessage', error.message, 'error');
      }
    }
    
    async function handleRegister(username, email, displayName, password) {
      try {
        // Sign up user
        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: {
            data: {
              username,
              display_name: displayName || username
            }
          }
        });
        
        if (error) throw error;
        
        // Create profile
        if (data.user) {
          await supabase.from('profiles').insert({
            id: data.user.id,
            username,
            display_name: displayName || username,
            email,
            created_at: new Date().toISOString()
          });
          
          // Create initial stats
          await supabase.from('user_stats').insert({
            user_id: data.user.id,
            ratings_given: 0,
            favorites_count: 0,
            games_played: 0,
            login_days: 1,
            login_streak: 1,
            last_login_date: new Date().toISOString().split('T')[0]
          });
          
          // Unlock Welcome Aboard achievement
          await unlockAchievement(1);
        }
        
        showMessage('registerMessage', 'Registration successful! Check your email to confirm.', 'success');
        
      } catch (error) {
        showMessage('registerMessage', error.message, 'error');
      }
    }
    
    async function handleLogout() {
      await supabase.auth.signOut();
      currentUser = null;
      currentSession = null;
      userProfile = null;
      userAchievements = {};
      updateUIForAuthState();
      renderCurrentTab();
    }
    
    // ===== ACHIEVEMENT SYSTEM =====
    async function unlockAchievement(achievementId) {
      if (!currentUser || userAchievements[achievementId]) return false;
      
      try {
        // Insert into database
        const { error } = await supabase
          .from('user_achievements')
          .insert({
            user_id: currentUser.id,
            achievement_id: achievementId,
            unlocked_at: new Date().toISOString()
          });
        
        if (error) throw error;
        
        userAchievements[achievementId] = true;
        
        // Show notification
        showAchievementNotification(achievementId);
        
        // Update UI if achievements tab is visible
        if (document.getElementById('achievementsTab').classList.contains('active')) {
          renderAchievements();
        }
        
        return true;
      } catch (error) {
        console.error('Error unlocking achievement:', error);
        return false;
      }
    }
    
    async function checkAchievements() {
      if (!currentUser) return;
      
      for (const [category, catData] of Object.entries(ACHIEVEMENTS_DATA)) {
        for (const ach of catData.achievements) {
          if (userAchievements[ach.id]) continue;
          
          let shouldUnlock = false;
          
          switch (ach.requirement) {
            case 'register':
              shouldUnlock = true;
              break;
            case 'ratings_given':
              shouldUnlock = userStats.ratings_given >= ach.required;
              break;
            case 'favorites_count':
              shouldUnlock = userStats.favorites_count >= ach.required;
              break;
            case 'games_played':
              shouldUnlock = userStats.games_played >= ach.required;
              break;
            case 'login_days':
              shouldUnlock = userStats.login_days >= ach.required;
              break;
            case 'login_streak':
              shouldUnlock = userStats.login_streak >= ach.required;
              break;
            case 'games_in_session':
              shouldUnlock = userStats.games_in_session >= ach.required;
              break;
            case 'genres_rated':
              shouldUnlock = (userStats.genres_rated?.length || 0) >= ach.required;
              break;
            case 'genres_played':
              shouldUnlock = (userStats.genres_played?.length || 0) >= ach.required;
              break;
            case 'theme_changes':
              shouldUnlock = userStats.theme_changes >= ach.required;
              break;
            case 'categoryComplete':
              shouldUnlock = await checkCategoryComplete(ach.required);
              break;
          }
          
          if (shouldUnlock) {
            await unlockAchievement(ach.id);
          }
        }
      }
    }
    
    async function checkCategoryComplete(categoryName) {
      const catData = ACHIEVEMENTS_DATA[categoryName];
      if (!catData) return false;
      
      for (const ach of catData.achievements) {
        if (ach.id.toString().endsWith('+')) continue; // Skip the + achievement itself
        if (!userAchievements[ach.id]) return false;
      }
      
      return true;
    }
    
    function showAchievementNotification(achievementId) {
      // Find achievement details
      let achievement = null;
      for (const cat of Object.values(ACHIEVEMENTS_DATA)) {
        const found = cat.achievements.find(a => a.id === achievementId);
        if (found) {
          achievement = found;
          break;
        }
      }
      
      if (!achievement) return;
      
      // Create and show notification
      const notification = document.createElement('div');
      notification.style.cssText = `
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: linear-gradient(135deg, rgba(255,204,0,0.2), rgba(45,90,227,0.2));
        border: 1px solid #ffcc00;
        border-radius: 12px;
        padding: 15px 20px;
        color: white;
        z-index: 1000;
        animation: slideIn 0.3s ease;
        backdrop-filter: blur(10px);
      `;
      
      notification.innerHTML = `
        <div style="display: flex; align-items: center; gap: 12px;">
          <span style="font-size: 32px;">${achievement.icon}</span>
          <div>
            <div style="font-weight: bold; color: #ffcc00;">Achievement Unlocked!</div>
            <div style="font-size: 14px;">${achievement.name}</div>
            <div style="font-size: 11px; opacity: 0.7;">${achievement.desc}</div>
          </div>
        </div>
      `;
      
      document.body.appendChild(notification);
      
      setTimeout(() => {
        notification.style.animation = 'slideOut 0.3s ease';
        setTimeout(() => notification.remove(), 300);
      }, 5000);
    }
    
    // ===== RENDERING =====
    function renderProfile() {
      const container = document.getElementById('profileContent');
      if (!container) return;
      
      if (!currentUser) {
        container.innerHTML = `
          <div style="text-align: center; padding: 40px;">
            <p>Please log in to view your profile</p>
          </div>
        `;
        return;
      }
      
      const displayName = userProfile?.display_name || currentUser.email?.split('@')[0] || 'User';
      const joinDate = userProfile?.created_at ? new Date(userProfile.created_at).toLocaleDateString() : 'Today';
      
      container.innerHTML = `
        <div class="profile-info">
          <div class="profile-avatar">
            ${displayName[0].toUpperCase()}
          </div>
          <h2>${displayName}</h2>
          <p style="opacity: 0.7; font-size: 14px;">@${userProfile?.username || 'user'}</p>
          <p style="opacity: 0.5; font-size: 12px;">Member since ${joinDate}</p>
        </div>
        
        <div class="profile-stats">
          <div class="stat">
            <div class="stat-number">${userStats.games_played || 0}</div>
            <div class="stat-label">Games Played</div>
          </div>
          <div class="stat">
            <div class="stat-number">${userStats.ratings_given || 0}</div>
            <div class="stat-label">Ratings</div>
          </div>
          <div class="stat">
            <div class="stat-number">${userStats.favorites_count || 0}</div>
            <div class="stat-label">Favorites</div>
          </div>
          <div class="stat">
            <div class="stat-number">${userStats.login_streak || 0}</div>
            <div class="stat-label">Day Streak</div>
          </div>
        </div>
        
        <div class="divider"></div>
        
        <button class="settings-btn logout-btn" onclick="handleLogout()">Logout</button>
      `;
    }
    
    function renderAchievements() {
      const container = document.getElementById('achievementsContent');
      if (!container) return;
      
      if (!currentUser) {
        container.innerHTML = `
          <div style="text-align: center; padding: 40px;">
            <p>Please log in to view achievements</p>
          </div>
        `;
        return;
      }
      
      let totalPoints = 0;
      let totalAchievements = 0;
      let maxPoints = 0;
      
      // Calculate totals
      for (const cat of Object.values(ACHIEVEMENTS_DATA)) {
        const progress = getCategoryProgress(cat.name.toLowerCase());
        totalPoints += progress.points;
        totalAchievements += progress.earned;
        maxPoints += cat.achievements.length * cat.pointsPer;
      }
      
      const totalPercent = maxPoints > 0 ? (totalPoints / maxPoints) * 100 : 0;
      
      let html = `
        <div class="achievements-header">
          <div class="total-score">
            <span class="score-number">${totalPoints.toFixed(1)}</span>
            <span class="score-label">points</span>
          </div>
          <div class="total-progress">
            <div class="total-progress-bar">
              <div class="total-progress-fill" style="width: ${totalPercent}%;"></div>
            </div>
            <div class="total-progress-text">${totalAchievements}/63 achievements completed</div>
          </div>
        </div>
      `;
      
      for (const [catKey, catData] of Object.entries(ACHIEVEMENTS_DATA)) {
        const progress = getCategoryProgress(catKey);
        const isOpen = localStorage.getItem(`category_${catKey}_open`) === 'true';
        
        html += `
          <div class="category-card category-${catKey} ${isOpen ? 'open' : ''}" data-category="${catKey}">
            <div class="category-header" onclick="toggleCategory('${catKey}')">
              <div class="category-title">
                <span class="category-icon">${catData.icon}</span>
                <span class="category-name" style="color: ${catData.color}">${catData.name}</span>
              </div>
              <div class="category-stats">
                <div class="category-points">${progress.points.toFixed(1)} / ${(catData.achievements.length * catData.pointsPer).toFixed(1)} pts</div>
                <div class="category-progress">${progress.earned}/${progress.total}</div>
                <div class="category-progress-bar">
                  <div class="category-progress-fill" style="width: ${progress.percent}%;"></div>
                </div>
              </div>
            </div>
            <div class="achievements-list">
        `;
        
        for (const ach of catData.achievements) {
          const isUnlocked = userAchievements[ach.id] === true;
          const isHidden = ach.hidden === true && !isUnlocked;
          
          let displayName = ach.name;
          let displayDesc = ach.desc;
          let displayIcon = ach.icon;
          
          if (isHidden) {
            displayName = '???';
            displayDesc = ach.hint || 'secret achievement - keep exploring!';
            displayIcon = '❓';
          } else if (!isUnlocked && ach.hint && catKey !== 'newbie') {
            displayDesc = ach.hint;
          }
          
          html += `
            <div class="achievement-item ${isUnlocked ? 'unlocked' : 'locked'} ${isHidden ? 'secret-hidden' : ''}">
              <div class="achievement-icon">${displayIcon}</div>
              <div class="achievement-info">
                <div class="achievement-name">${displayName}</div>
                <div class="achievement-desc">${displayDesc}</div>
              </div>
              <div class="achievement-points">+${catData.pointsPer.toFixed(1)}</div>
            </div>
          `;
        }
        
        html += `
            </div>
          </div>
        `;
      }
      
      container.innerHTML = html;
    }
    
    function getCategoryProgress(category) {
      const catData = ACHIEVEMENTS_DATA[category];
      if (!catData) return { earned: 0, total: 0, points: 0, percent: 0 };
      
      let earned = 0;
      let points = 0;
      let total = catData.achievements.length;
      
      catData.achievements.forEach(ach => {
        if (userAchievements[ach.id]) {
          earned++;
          points += catData.pointsPer;
        }
      });
      
      return { 
        earned, 
        total, 
        points, 
        percent: total > 0 ? (earned / total) * 100 : 0 
      };
    }
    
    function renderCurrentTab() {
      const activeTab = document.querySelector('.account-tab-content.active');
      if (!activeTab) return;
      
      if (activeTab.id === 'profileTab') {
        renderProfile();
      } else if (activeTab.id === 'achievementsTab') {
        renderAchievements();
      }
    }
    
    function updateUIForAuthState() {
      const accountName = document.getElementById('accountName');
      const tabs = document.querySelectorAll('.account-tab');
      
      if (currentUser) {
        const displayName = userProfile?.display_name || currentUser.email?.split('@')[0] || 'User';
        if (accountName) accountName.textContent = displayName;
        
        // Hide login/register tabs when logged in
        tabs.forEach(tab => {
          const tabName = tab.getAttribute('data-tab');
          if (tabName === 'login' || tabName === 'register') {
            tab.style.display = 'none';
          }
        });
      } else {
        if (accountName) accountName.textContent = 'Guest';
        
        // Show login/register tabs
        tabs.forEach(tab => {
          tab.style.display = 'block';
        });
        
        // Switch to login tab if on protected tab
        const activeTab = document.querySelector('.account-tab-content.active');
        if (activeTab && (activeTab.id === 'profileTab' || activeTab.id === 'achievementsTab')) {
          switchTab('login');
        }
      }
    }
    
    // ===== UI HELPERS =====
    function setupTabs() {
      const tabs = document.querySelectorAll('.account-tab');
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          const tabName = tab.getAttribute('data-tab');
          switchTab(tabName);
        });
      });
      
      // Setup forms
      document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        await handleLogin(email, password);
      });
      
      document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('regUsername').value;
        const email = document.getElementById('regEmail').value;
        const displayName = document.getElementById('regDisplayName').value;
        const password = document.getElementById('regPassword').value;
        const confirmPassword = document.getElementById('regConfirmPassword').value;
        
        if (password !== confirmPassword) {
          showMessage('registerMessage', 'Passwords do not match', 'error');
          return;
        }
        
        await handleRegister(username, email, displayName, password);
      });
    }
    
    function switchTab(tabName) {
      // Update tab buttons
      document.querySelectorAll('.account-tab').forEach(tab => {
        if (tab.getAttribute('data-tab') === tabName) {
          tab.classList.add('active');
        } else {
          tab.classList.remove('active');
        }
      });
      
      // Update content
      document.querySelectorAll('.account-tab-content').forEach(content => {
        if (content.id === `${tabName}Tab`) {
          content.classList.add('active');
        } else {
          content.classList.remove('active');
        }
      });
      
      renderCurrentTab();
    }
    
    function toggleCategory(category) {
      const card = document.querySelector(`.category-card[data-category="${category}"]`);
      if (card) {
        card.classList.toggle('open');
        localStorage.setItem(`category_${category}_open`, card.classList.contains('open'));
      }
    }
    
    function showMessage(elementId, message, type) {
      const element = document.getElementById(elementId);
      if (element) {
        element.textContent = message;
        element.className = `message ${type}`;
      }
    }
    
    // Make functions available globally
    window.toggleCategory = toggleCategory;
    window.handleLogout = handleLogout;
    
    // Start the app
    initializeApp();
  </script>
</body>
</html>
