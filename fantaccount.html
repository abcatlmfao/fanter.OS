    /* ALL STYLES FROM PREVIOUS VERSION - KEEP EVERYTHING */
    .account-container {
      max-width: 1000px;
      margin: 100px auto;
      padding: 30px;
      background: rgba(20, 30, 50, 0.8);
      border-radius: 20px;
      border: 1px solid rgba(45, 90, 227, 0.4);
    }
    
    .account-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 10px;
      flex-wrap: wrap;
    }
    
    .account-tab {
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      padding: 10px 20px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.3s ease;
      border-radius: 8px;
    }
    
    .account-tab:hover {
      background: rgba(255,255,255,0.05);
    }
    
    .account-tab.active {
      color: #ffcc00;
      background: rgba(255,204,0,0.1);
      border-bottom: 2px solid #ffcc00;
    }
    
    .account-tab-content {
      display: none;
    }
    
    .account-tab-content.active {
      display: block;
    }
    
    .account-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      text-align: left;
      max-width: 400px;
      margin: 0 auto;
    }
    
    .account-form input {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(45, 90, 227, 0.4);
      background: rgba(0,0,0,0.3);
      color: white;
      font-size: 14px;
    }
    
    .account-form input:focus {
      outline: none;
      border-color: #ffcc00;
    }
    
    .profile-info {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .profile-avatar {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #2d5ae3, #ffcc00);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin: 0 auto 15px;
      font-weight: bold;
    }
    
    .profile-stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    
    .stat {
      text-align: center;
    }
    
    .stat-number {
      font-size: 24px;
      font-weight: bold;
      color: #ffcc00;
    }
    
    .stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }
    
    .message {
      padding: 10px;
      border-radius: 8px;
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }
    
    .message.error {
      background: rgba(255,0,0,0.2);
      color: #ff6666;
    }
    
    .message.success {
      background: rgba(0,255,0,0.2);
      color: #66ff66;
    }
    
    .settings-btn {
      background: rgba(45, 90, 227, 0.3);
      border: 1px solid rgba(45, 90, 227, 0.5);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
      width: 100%;
    }
    
    .settings-btn:hover {
      background: rgba(45, 90, 227, 0.5);
      transform: translateY(-2px);
    }
    
    .logout-btn {
      background: rgba(220, 50, 50, 0.2);
      border-color: rgba(220, 50, 50, 0.5);
    }
    
    .logout-btn:hover {
      background: rgba(220, 50, 50, 0.4);
    }
    
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 20px 0;
    }

    .leaderboard-filters {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .filter-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    
    .filter-btn.active {
      background: rgba(255,204,0,0.2);
      border-color: #ffcc00;
      color: #ffcc00;
    }
    
    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .leaderboard-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.05);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .leaderboard-item:hover {
      background: rgba(255,255,255,0.08);
      transform: translateX(5px);
    }
    
    .leaderboard-item.current-user {
      background: rgba(255,204,0,0.1);
      border-color: #ffcc00;
    }
    
    .rank {
      font-size: 20px;
      font-weight: bold;
      min-width: 40px;
      color: rgba(255,255,255,0.5);
    }
    
    .rank.top-1 { color: #ffcc00; }
    .rank.top-2 { color: #c0c0c0; }
    .rank.top-3 { color: #cd7f32; }
    
    .user-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #2d5ae3, #ffcc00);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
    }
    
    .user-info {
      flex: 1;
    }
    
    .user-name {
      font-size: 16px;
      font-weight: bold;
    }
    
    .user-username {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
    
    .user-score {
      font-size: 20px;
      font-weight: bold;
      color: #ffcc00;
      margin-right: 10px;
    }
    
    .user-coins {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #ffcc00;
      font-size: 14px;
    }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-content {
      background: rgba(20, 30, 50, 0.95);
      border-radius: 20px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid rgba(45, 90, 227, 0.4);
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .modal-close {
      background: none;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      opacity: 0.7;
    }
    
    .modal-close:hover {
      opacity: 1;
    }

    .achievements-header {

      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 15px;

      padding: 8px 20px;
      text-align: center;

      font-weight: bold;
      color: #ffcc00;
      font-family: 'Orbitron', monospace;
    }
    
    .total-score .score-label {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      margin-left: 8px;
    }
    
    .total-progress {
      flex: 1;
      min-width: 200px;
    }
    
    .total-progress-bar {
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 5px;
    }

      background: linear-gradient(90deg, #ffcc00, #ffaa00);
      width: 0%;
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    
    .total-progress-text {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }

      margin-bottom: 20px;

      align-items: center;

    .category-name {

      font-weight: bold;

    .category-stats {

    }
    
    .category-points {

      color: #ffcc00;
    }

      font-size: 11px;
      color: rgba(255,255,255,0.5);

      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 5px;
      overflow: hidden;
    }
    
    .category-progress-fill {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .category-beginner .category-progress-fill { background: #2d5ae3; }

    .category-difficult .category-progress-fill { background: #ff4444; }
    .category-elite .category-progress-fill { background: #ffcc00; }
    .category-secret .category-progress-fill { background: linear-gradient(90deg, #ff00ff, #00ffff); }

      padding: 15px 20px;
      display: none;
      flex-direction: column;
      gap: 12px;
    }

      display: flex;
    }
    
    .achievement-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      transition: all 0.2s ease;
    }
    
    .achievement-item.unlocked {
      background: linear-gradient(135deg, rgba(255,204,0,0.1), rgba(255,204,0,0.02));
      border-left: 3px solid #ffcc00;

    .achievement-icon {
      font-size: 32px;
      min-width: 50px;
      text-align: center;
    }
    
    .achievement-info {
      flex: 1;
    }
    
    .achievement-name {
      font-size: 14px;
      font-weight: bold;
      color: white;
    }
    
    .achievement-desc {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }
    
    .achievement-points {
      font-size: 12px;
      color: #ffcc00;
      min-width: 50px;
      text-align: right;
    }
    
    .achievement-item.secret-hidden .achievement-icon {
      filter: blur(4px);
    }
    
    .achievement-item.secret-hidden .achievement-name,
    .achievement-item.secret-hidden .achievement-desc {
      filter: blur(3px);
      user-select: none;
    }
    
    .guest-message {
      text-align: center;
      padding: 40px;

  <!-- Account Button -->
  <div class="account-btn-container">
    <button class="account-btn" id="accountBtn" onclick="window.location.href='fantaccount.html'">
      <span class="account-icon">👤</span>
      <span class="account-name" id="accountName">Guest</span>
    </button>
  </div>

  <div class="center">
    <h1>account.</h1>
    <p>manage your fanter profile</p>
    <button class="settings-btn" onclick="window.location.href='index.html'" style="width: auto; padding: 8px 16px;">← back</button>
  </div>

  <div class="account-container">
    <div class="account-tabs">
      <button class="account-tab active" data-tab="profile">my profile</button>
      <button class="account-tab" data-tab="achievements">🏆 achievements</button>
      <button class="account-tab" data-tab="leaderboard">🏅 leaderboard</button>
      <button class="account-tab" data-tab="login">login</button>
      <button class="account-tab" data-tab="register">register</button>
    </div>

    <!-- Profile Tab -->
    <div id="profileTab" class="account-tab-content active">
      <div id="profileContent">
        <div class="guest-message">loading profile...</div>
      </div>
    </div>

    <!-- Achievements Tab -->
    <div id="achievementsTab" class="account-tab-content">
      <div id="achievementsContent">
        <div class="guest-message">loading achievements...</div>
      </div>
    </div>

    <!-- Leaderboard Tab -->
    <div id="leaderboardTab" class="account-tab-content">
      <div id="leaderboardContent">
        <div class="leaderboard-filters">
          <button class="filter-btn active" data-filter="points">Achievement Points</button>
          <button class="filter-btn" data-filter="coins">Coins</button>
          <button class="filter-btn" data-filter="games_played">Games Played</button>
        </div>
        <div id="leaderboardList" class="leaderboard-list">
          <div class="guest-message">loading leaderboard...</div>
        </div>
      </div>
    </div>

    <!-- Login Tab -->
    <div id="loginTab" class="account-tab-content">
      <form id="loginForm" class="account-form">
        <input type="email" id="loginEmail" placeholder="email" required>
        <input type="password" id="loginPassword" placeholder="password" required>
        <button type="submit" class="settings-btn">login</button>
        <div id="loginMessage" class="message"></div>
      </form>
      <div style="text-align: center; margin-top: 20px;">
        <p style="opacity: 0.7; font-size: 14px;">or continue as guest</p>
        <button onclick="continueAsGuest()" class="settings-btn" style="margin-top: 10px;">continue as guest</button>
      </div>
    </div>

    <!-- Register Tab -->
    <div id="registerTab" class="account-tab-content">
      <form id="registerForm" class="account-form">
        <input type="text" id="regUsername" placeholder="username" required>
        <input type="email" id="regEmail" placeholder="email" required>
        <input type="text" id="regDisplayName" placeholder="display name (optional)">
        <input type="password" id="regPassword" placeholder="password" required>
        <input type="password" id="regConfirmPassword" placeholder="confirm password" required>
        <button type="submit" class="settings-btn">register</button>
        <div id="registerMessage" class="message"></div>
      </form>
    </div>
  </div>

    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalUsername">User Profile</h2>

      </div>
      <div id="modalContent">
        <div class="guest-message">loading...</div>
      </div>
    </div>
  </div>

    // ===== INITIALIZATION =====
    async function initializeApp() {
      await checkSession();
      setupTabs();
      setupLeaderboardFilters();
      renderCurrentTab();
    }
    
    async function checkSession() {
      const { data: { session } } = await supabase.auth.getSession();
      currentSession = session;
      currentUser = session?.user || null;
      
      if (currentUser) {
        await loadUserData();
      } else {
        loadGuestData();
      }
      
      updateUIForAuthState();
    }
    
    async function loadUserData() {
      try {
        const { data: profile } = await supabase
          .from('profiles')
          .select('*')
          .eq('id', currentUser.id)
          .single();
        
        if (profile) userProfile = profile;
        
        const { data: stats } = await supabase
          .from('user_stats')
          .select('*')
          .eq('user_id', currentUser.id)
          .single();
        
        if (stats) userStats = stats;
        
        const { data: achievements } = await supabase
          .from('user_achievements')
          .select('achievement_id')
          .eq('user_id', currentUser.id);
        
        userAchievements = {};
        achievements?.forEach(ach => {
          userAchievements[ach.achievement_id] = true;
        });
        
      } catch (error) {
        console.error('Error loading user data:', error);
      }
    }
    
    function loadGuestData() {
      const guestData = localStorage.getItem('fanter_guestData');
      if (guestData) {
        const data = JSON.parse(guestData);
        userStats = data.stats || {};
        userAchievements = data.achievements || {};
      }
    }

    function renderAchievements() {
      const container = document.getElementById('achievementsContent');
      
      if (!currentUser) {
        container.innerHTML = `
          <div class="guest-message">
            <p>Please log in to view achievements</p>
          </div>
        `;
        return;
      }
      
      let totalPoints = 0;
      let totalAchievements = 0;
      let maxPoints = 0;
      
      for (const cat of Object.values(ACHIEVEMENTS_DATA)) {
        const progress = getCategoryProgress(cat.name.toLowerCase());
        totalPoints += progress.points;
        totalAchievements += progress.earned;
        maxPoints += cat.achievements.length * cat.pointsPer;
      }
      
      const totalPercent = maxPoints > 0 ? (totalPoints / maxPoints) * 100 : 0;
      
      let html = `
        <div class="achievements-header">
          <div class="total-score">
            <span class="score-number">${totalPoints.toFixed(1)}</span>
            <span class="score-label">points</span>
          </div>
          <div class="total-progress">
            <div class="total-progress-bar">
              <div class="total-progress-fill" style="width: ${totalPercent}%;"></div>
            </div>
            <div class="total-progress-text">${totalAchievements}/63 achievements completed</div>
          </div>
        </div>
      `;
      
      for (const [catKey, catData] of Object.entries(ACHIEVEMENTS_DATA)) {
        const progress = getCategoryProgress(catKey);
        const isOpen = localStorage.getItem(`category_${catKey}_open`) === 'true';
        
        html += `
          <div class="category-card category-${catKey} ${isOpen ? 'open' : ''}" data-category="${catKey}">
            <div class="category-header" onclick="toggleCategory('${catKey}')">
              <div class="category-title">
                <span class="category-icon">${catData.icon}</span>
                <span class="category-name" style="color: ${catData.color}">${catData.name}</span>
              </div>
              <div class="category-stats">
                <div class="category-points">${progress.points.toFixed(1)} / ${(catData.achievements.length * catData.pointsPer).toFixed(1)} pts</div>
                <div class="category-progress">${progress.earned}/${progress.total}</div>
                <div class="category-progress-bar">
                  <div class="category-progress-fill" style="width: ${progress.percent}%;"></div>
                </div>
              </div>
            </div>
            <div class="achievements-list">
        `;
        
        for (const ach of catData.achievements) {
          const isUnlocked = userAchievements[ach.id] === true;
          const isHidden = ach.hidden === true && !isUnlocked;
          
          let displayName = ach.name;
          let displayDesc = ach.desc;
          let displayIcon = ach.icon;
          
          if (isHidden) {
            displayName = '???';
            displayDesc = ach.hint || 'secret achievement - keep exploring!';
            displayIcon = '❓';
          } else if (!isUnlocked && ach.hint && catKey !== 'newbie') {
            displayDesc = ach.hint;
          }
          
          html += `
            <div class="achievement-item ${isUnlocked ? 'unlocked' : 'locked'} ${isHidden ? 'secret-hidden' : ''}">
              <div class="achievement-icon">${displayIcon}</div>
              <div class="achievement-info">
                <div class="achievement-name">${displayName}</div>
                <div class="achievement-desc">${displayDesc}</div>
              </div>
              <div class="achievement-points">+${catData.pointsPer.toFixed(1)}</div>
            </div>
          `;
        }
        
        html += `
            </div>
          </div>
        `;
      }
      
      container.innerHTML = html;
    }
    
    function getCategoryProgress(category) {
      const catData = ACHIEVEMENTS_DATA[category];
      if (!catData) return { earned: 0, total: 0, points: 0, percent: 0 };
      
      let earned = 0;
      let points = 0;
      let total = catData.achievements.length;
      
      catData.achievements.forEach(ach => {
        if (userAchievements[ach.id]) {
          earned++;
          points += catData.pointsPer;
        }
      });
      
      return { 
        earned, 
        total, 
        points, 
        percent: total > 0 ? (earned / total) * 100 : 0 
      };
    }
    
    async function renderLeaderboard() {
      const container = document.getElementById('leaderboardList');
      container.innerHTML = '<div class="guest-message">loading leaderboard...</div>';
      
      try {
        // Get profiles with stats
        const { data: profiles, error } = await supabase
          .from('profiles')
          .select(`
            id,
            username,
            display_name,
            coins
          `);
        
        if (error) throw error;
        
        // Get stats and calculate achievement points
        const leaderboardData = [];
        
        for (const profile of profiles) {
          const { data: stats } = await supabase
            .from('user_stats')
            .select('*')
            .eq('user_id', profile.id)
            .single();
          
          const { data: achievements } = await supabase
            .from('user_achievements')
            .select('achievement_id')
            .eq('user_id', profile.id);
          
          let achievementPoints = 0;
          achievements?.forEach(ach => {
            for (const cat of Object.values(ACHIEVEMENTS_DATA)) {
              const found = cat.achievements.find(a => a.id === ach.achievement_id);
              if (found) {
                achievementPoints += cat.pointsPer;
                break;
              }
            }
          });
          
          leaderboardData.push({
            ...profile,
            stats: stats || {},
            achievement_points: achievementPoints
          });
        }
        
        // Sort based on filter
        if (currentFilter === 'coins') {
          leaderboardData.sort((a, b) => (b.coins || 0) - (a.coins || 0));
        } else if (currentFilter === 'games_played') {
          leaderboardData.sort((a, b) => (b.stats?.games_played || 0) - (a.stats?.games_played || 0));
        } else {
          leaderboardData.sort((a, b) => b.achievement_points - a.achievement_points);
        }
        
        let html = '';
        leaderboardData.slice(0, 50).forEach((user, index) => {
          const rank = index + 1;
          const rankClass = rank <= 3 ? `top-${rank}` : '';
          const isCurrentUser = currentUser && user.id === currentUser.id;
          const displayName = user.display_name || user.username || 'User';
          
          let score = '';
          if (currentFilter === 'coins') {
            score = `💰 ${user.coins || 0}`;
          } else if (currentFilter === 'games_played') {
            score = `🎮 ${user.stats?.games_played || 0}`;
          } else {
            score = `🏆 ${user.achievement_points.toFixed(1)}`;
          }
          
          html += `
            <div class="leaderboard-item ${isCurrentUser ? 'current-user' : ''}" onclick="viewPublicProfile('${user.id}')">
              <div class="rank ${rankClass}">#${rank}</div>
              <div class="user-avatar">${displayName[0].toUpperCase()}</div>
              <div class="user-info">
                <div class="user-name">${displayName}</div>
                <div class="user-username">@${user.username}</div>
              </div>
              <div class="user-score">${score}</div>
            </div>
          `;
        });
        
        container.innerHTML = html || '<div class="guest-message">no users found</div>';
        
      } catch (error) {
        console.error('Error loading leaderboard:', error);
        container.innerHTML = '<div class="guest-message">error loading leaderboard</div>';
      }
    }

    // ===== AUTH FUNCTIONS =====
    async function handleLogin(email, password) {
      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        
        showMessage('loginMessage', 'Login successful!', 'success');
        setTimeout(() => window.location.reload(), 1000);
      } catch (error) {
        showMessage('loginMessage', error.message, 'error');
      }
    }
    
    async function handleRegister(username, email, displayName, password) {
      try {
        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: {
            data: { username, display_name: displayName || username }
          }
        });
        
        if (error) throw error;
        
        showMessage('registerMessage', 'Account created! Check your email to confirm.', 'success');
      } catch (error) {
        showMessage('registerMessage', error.message, 'error');
      }
    }
    
    async function handleLogout() {
      await supabase.auth.signOut();
      currentUser = null;
      currentSession = null;
      userProfile = null;
      updateUIForAuthState();
      switchTab('profile');
    }
    
    function continueAsGuest() {
      currentUser = null;
      loadGuestData();
      updateUIForAuthState();
      switchTab('profile');
    }
    
    // ===== UI HELPERS =====
    function setupTabs() {
      document.querySelectorAll('.account-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          switchTab(tab.getAttribute('data-tab'));
        });
      });
      
      document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        await handleLogin(
          document.getElementById('loginEmail').value,
          document.getElementById('loginPassword').value
        );
      });
      
      document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirmPassword').value;
        
        if (password !== confirm) {
          showMessage('registerMessage', 'Passwords do not match', 'error');
          return;
        }
        
        await handleRegister(
          document.getElementById('regUsername').value,
          document.getElementById('regEmail').value,
          document.getElementById('regDisplayName').value,
          password
        );
      });
    }
    
    function setupLeaderboardFilters() {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentFilter = btn.getAttribute('data-filter');
          renderLeaderboard();
        });
      });
    }
    
    function switchTab(tabName) {
      document.querySelectorAll('.account-tab').forEach(tab => {
        tab.classList.toggle('active', tab.getAttribute('data-tab') === tabName);
      });
      
      document.querySelectorAll('.account-tab-content').forEach(content => {
        content.classList.toggle('active', content.id === `${tabName}Tab`);
      });
      
      renderCurrentTab();
    }
    
    function renderCurrentTab() {
      const activeTab = document.querySelector('.account-tab-content.active');
      if (!activeTab) return;
      
      if (activeTab.id === 'profileTab') renderProfile();
      else if (activeTab.id === 'achievementsTab') renderAchievements();
      else if (activeTab.id === 'leaderboardTab') renderLeaderboard();
    }
    
    function updateUIForAuthState() {
      const accountName = document.getElementById('accountName');
      const tabs = document.querySelectorAll('.account-tab');
      
      if (currentUser) {
        const displayName = userProfile?.display_name || currentUser.email?.split('@')[0] || 'User';
        accountName.textContent = displayName;
        
        tabs.forEach(tab => {
          const tabName = tab.getAttribute('data-tab');
          tab.style.display = (tabName === 'login' || tabName === 'register') ? 'none' : 'block';
        });
      } else {
        accountName.textContent = 'Guest';
        tabs.forEach(tab => tab.style.display = 'block');
        
        const activeTab = document.querySelector('.account-tab-content.active');
        if (activeTab && activeTab.id === 'achievementsTab') {
          switchTab('profile');
        }
      }
    }
    
    function toggleCategory(category) {
      const card = document.querySelector(`.category-card[data-category="${category}"]`);
      if (card) {
        card.classList.toggle('open');
        localStorage.setItem(`category_${category}_open`, card.classList.contains('open'));
      }
    }
    
    function showMessage(elementId, message, type) {
      const element = document.getElementById(elementId);
      if (element) {
        element.textContent = message;
        element.className = `message ${type}`;
      }
    }
    
    function closeModal() {
      document.getElementById('profileModal').classList.remove('active');
    }
    
    // Make functions globally available
    window.switchTab = switchTab;
    window.handleLogout = handleLogout;
    window.continueAsGuest = continueAsGuest;
    window.viewPublicProfile = viewPublicProfile;
    window.closeModal = closeModal;
    window.toggleCategory = toggleCategory;
    
    // Initialize
    initializeApp();
  </script>
</body>
</html>
