<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fanter | account</title>
  <link rel="stylesheet" href="config/main.css" />
  <script src="config/theme-loader.js"></script>
  <style>
    /* ALL YOUR STYLES - KEEP THEM EXACTLY AS THEY ARE */
    .account-container {
      max-width: 1000px;
      margin: 100px auto;
      padding: 30px;
      background: rgba(20, 30, 50, 0.8);
      border-radius: 20px;
      border: 1px solid rgba(45, 90, 227, 0.4);
    }
    
    .account-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 10px;
      flex-wrap: wrap;
    }
    
    .account-tab {
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      padding: 10px 20px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.3s ease;
      border-radius: 8px;
    }
    
    .account-tab:hover {
      background: rgba(255,255,255,0.05);
    }
    
    .account-tab.active {
      color: #ffcc00;
      background: rgba(255,204,0,0.1);
      border-bottom: 2px solid #ffcc00;
    }
    
    .account-tab-content {
      display: none;
    }
    
    .account-tab-content.active {
      display: block;
    }
    
    .account-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      text-align: left;
      max-width: 400px;
      margin: 0 auto;
    }
    
    .account-form input {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(45, 90, 227, 0.4);
      background: rgba(0,0,0,0.3);
      color: white;
      font-size: 14px;
    }
    
    .account-form input:focus {
      outline: none;
      border-color: #ffcc00;
    }
    
    .profile-info {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .profile-avatar {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #2d5ae3, #ffcc00);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin: 0 auto 15px;
      font-weight: bold;
    }
    
    .profile-stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    
    .stat {
      text-align: center;
    }
    
    .stat-number {
      font-size: 24px;
      font-weight: bold;
      color: #ffcc00;
    }
    
    .stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }
    
    .message {
      padding: 10px;
      border-radius: 8px;
      margin-top: 15px;
      text-align: center;
      font-size: 14px;
    }
    
    .message.error {
      background: rgba(255,0,0,0.2);
      color: #ff6666;
    }
    
    .message.success {
      background: rgba(0,255,0,0.2);
      color: #66ff66;
    }
    
    .settings-btn {
      background: rgba(45, 90, 227, 0.3);
      border: 1px solid rgba(45, 90, 227, 0.5);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
      width: 100%;
    }
    
    .settings-btn:hover {
      background: rgba(45, 90, 227, 0.5);
      transform: translateY(-2px);
    }
    
    .logout-btn {
      background: rgba(220, 50, 50, 0.2);
      border-color: rgba(220, 50, 50, 0.5);
    }
    
    .logout-btn:hover {
      background: rgba(220, 50, 50, 0.4);
    }
    
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 20px 0;
    }
    
    .sync-status {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      margin-left: 10px;
    }
    
    .sync-status.online {
      background: rgba(0, 255, 0, 0.2);
      color: #00ff88;
    }
    
    .sync-status.offline {
      background: rgba(255, 165, 0, 0.2);
      color: #ffa500;
    }
    
    .guest-message {
      text-align: center;
      padding: 40px;
    }
    
    .leaderboard-filters {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .filter-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    
    .filter-btn.active {
      background: rgba(255,204,0,0.2);
      border-color: #ffcc00;
      color: #ffcc00;
    }
    
    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .leaderboard-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.05);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .leaderboard-item:hover {
      background: rgba(255,255,255,0.08);
      transform: translateX(5px);
    }
    
    .leaderboard-item.current-user {
      background: rgba(255,204,0,0.1);
      border-color: #ffcc00;
    }
    
    .rank {
      font-size: 20px;
      font-weight: bold;
      min-width: 40px;
      color: rgba(255,255,255,0.5);
    }
    
    .rank.top-1 { color: #ffcc00; }
    .rank.top-2 { color: #c0c0c0; }
    .rank.top-3 { color: #cd7f32; }
    
    .user-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #2d5ae3, #ffcc00);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
    }
    
    .user-info {
      flex: 1;
    }
    
    .user-name {
      font-size: 16px;
      font-weight: bold;
    }
    
    .user-username {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
    
    .user-score {
      font-size: 20px;
      font-weight: bold;
      color: #ffcc00;
      margin-right: 10px;
    }
    
    .user-coins {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #ffcc00;
      font-size: 14px;
    }
    
    .profile-games-section {
      margin-top: 25px;
      text-align: left;
    }
    
    .profile-games-section h3 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #ffcc00;
      font-family: 'Orbitron', monospace;
    }
    
    .profile-game-tag {
      display: inline-block;
      background: rgba(45, 90, 227, 0.3);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      margin: 3px;
    }
    
    .profile-game-tag.favorite {
      background: rgba(255, 204, 0, 0.2);
      color: #ffcc00;
    }
    
    .achievements-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 15px;
    }
    
    .total-score {
      background: linear-gradient(135deg, rgba(255,204,0,0.2), rgba(255,204,0,0.05));
      border: 1px solid rgba(255,204,0,0.3);
      border-radius: 30px;
      padding: 8px 20px;
      text-align: center;
    }
    
    .total-score .score-number {
      font-size: 28px;
      font-weight: bold;
      color: #ffcc00;
      font-family: 'Orbitron', monospace;
    }
    
    .total-score .score-label {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      margin-left: 8px;
    }
    
    .total-progress {
      flex: 1;
      min-width: 200px;
    }
    
    .total-progress-bar {
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 5px;
    }
    
    .total-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffcc00, #ffaa00);
      width: 0%;
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    
    .total-progress-text {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }
    
    .category-card {
      background: rgba(255,255,255,0.03);
      border-radius: 16px;
      margin-bottom: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
    }
    
    .category-header {
      padding: 15px 20px;
      background: rgba(0,0,0,0.2);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s ease;
    }
    
    .category-header:hover {
      background: rgba(0,0,0,0.3);
    }
    
    .category-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .category-icon {
      font-size: 24px;
    }
    
    .category-name {
      font-size: 16px;
      font-weight: bold;
      font-family: 'Orbitron', monospace;
    }
    
    .category-stats {
      text-align: right;
    }
    
    .category-points {
      font-size: 14px;
      color: #ffcc00;
    }
    
    .category-progress {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }
    
    .category-progress-bar {
      width: 150px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 5px;
      overflow: hidden;
    }
    
    .category-progress-fill {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }
    
    .category-newbie .category-progress-fill { background: #00ff88; }
    .category-beginner .category-progress-fill { background: #2d5ae3; }
    .category-climbing .category-progress-fill { background: #ff8800; }
    .category-difficult .category-progress-fill { background: #ff4444; }
    .category-elite .category-progress-fill { background: #ffcc00; }
    .category-secret .category-progress-fill { background: linear-gradient(90deg, #ff00ff, #00ffff); }
    
    .achievements-list {
      padding: 15px 20px;
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    
    .category-card.open .achievements-list {
      display: flex;
    }
    
    .achievement-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      transition: all 0.2s ease;
    }
    
    .achievement-item.unlocked {
      background: linear-gradient(135deg, rgba(255,204,0,0.1), rgba(255,204,0,0.02));
      border-left: 3px solid #ffcc00;
    }
    
    .achievement-item.locked {
      opacity: 0.7;
    }
    
    .achievement-icon {
      font-size: 32px;
      min-width: 50px;
      text-align: center;
    }
    
    .achievement-info {
      flex: 1;
    }
    
    .achievement-name {
      font-size: 14px;
      font-weight: bold;
      color: white;
    }
    
    .achievement-desc {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }
    
    .achievement-points {
      font-size: 12px;
      color: #ffcc00;
      min-width: 50px;
      text-align: right;
    }
    
    .achievement-item.secret-hidden .achievement-icon {
      filter: blur(4px);
    }
    
    .achievement-item.secret-hidden .achievement-name,
    .achievement-item.secret-hidden .achievement-desc {
      filter: blur(3px);
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="account-btn-container">
    <button class="account-btn" id="accountBtn" onclick="window.location.href='fantaccount.html'">
      <span class="account-icon">👤</span>
      <span class="account-name" id="accountName">Guest</span>
    </button>
  </div>

  <div class="center">
    <h1>account.</h1>
    <p>manage your fanter profile</p>
    <button class="settings-btn" onclick="window.location.href='index.html'" style="width: auto; padding: 8px 16px;">← back</button>
  </div>

  <div class="account-container">
    <div class="account-tabs">
      <button class="account-tab active" data-tab="profile">my profile</button>
      <button class="account-tab" data-tab="achievements">🏆 achievements</button>
      <button class="account-tab" data-tab="leaderboard">🏅 leaderboard</button>
      <button class="account-tab" data-tab="login">login</button>
      <button class="account-tab" data-tab="register">register</button>
    </div>

    <div id="profileTab" class="account-tab-content active">
      <div id="profileContent">
        <div class="guest-message">loading profile...</div>
      </div>
    </div>

    <div id="achievementsTab" class="account-tab-content">
      <div id="achievementsContent">
        <div class="guest-message">loading achievements...</div>
      </div>
    </div>

    <div id="leaderboardTab" class="account-tab-content">
      <div id="leaderboardContent">
        <div class="leaderboard-filters">
          <button class="filter-btn active" data-filter="coins">💰 Coins</button>
          <button class="filter-btn" data-filter="games_played">🎮 Games Played</button>
          <button class="filter-btn" data-filter="achievements">🏆 Achievements</button>
        </div>
        <div id="leaderboardList" class="leaderboard-list">
          <div class="guest-message">loading leaderboard...</div>
        </div>
      </div>
    </div>

    <div id="loginTab" class="account-tab-content">
      <form id="loginForm" class="account-form">
        <input type="email" id="loginEmail" placeholder="email" required>
        <input type="password" id="loginPassword" placeholder="password" required>
        <button type="submit" class="settings-btn">login with supabase</button>
        <div id="loginMessage" class="message"></div>
      </form>
      <div style="text-align: center; margin-top: 20px;">
        <p style="opacity: 0.7; font-size: 14px;">or</p>
        <button onclick="continueWithLocalStorage()" class="settings-btn" style="margin-top: 10px;">continue with local save</button>
      </div>
    </div>

    <div id="registerTab" class="account-tab-content">
      <form id="registerForm" class="account-form">
        <input type="text" id="regUsername" placeholder="username" required>
        <input type="email" id="regEmail" placeholder="email" required>
        <input type="text" id="regDisplayName" placeholder="display name (optional)">
        <input type="password" id="regPassword" placeholder="password" required>
        <input type="password" id="regConfirmPassword" placeholder="confirm password" required>
        <button type="submit" class="settings-btn">register with supabase</button>
        <div id="registerMessage" class="message"></div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ===== SUPABASE CONFIG - NO REDECLARATION =====
    const SUPABASE_URL = "https://gvzgnclowylrrpovdvtw.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2emduY2xvd3lscnJwb3ZkdnR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NjM5ODEsImV4cCI6MjA5MjAzOTk4MX0.p7oeYBVX870iSK-TLDRj6pfW7wLj7HJsTHjNWaNpL7o";
    
    // Use existing supabase or create - but DON'T use const/let supabase
    if (!window.supabase) {
      window.supabase = supabaseClient.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }
    console.log('✅ Supabase ready');
    
    // ===== ACHIEVEMENTS DATA =====
    const ACHIEVEMENTS_DATA = {
      newbie: {
        name: "Newbie", icon: "🌱", color: "#00ff88", pointsPer: 0.1,
        achievements: [
          { id: 1, name: "Welcome Aboard", desc: "Create an account", requirement: "register", required: 1, icon: "🎉", hint: null },
          { id: 2, name: "First Impression", desc: "Rate your first game", requirement: "ratings_given", required: 1, icon: "⭐", hint: null },
          { id: 3, name: "Hearted", desc: "Favorite your first game", requirement: "favorites_count", required: 1, icon: "💖", hint: null },
          { id: 4, name: "Let's Play", desc: "Play your first game", requirement: "games_played", required: 1, icon: "🎮", hint: null },
          { id: 5, name: "Getting There", desc: "Rate 10 games", requirement: "ratings_given", required: 10, icon: "📈", hint: null },
          { id: 6, name: "Small Collection", desc: "Favorite 10 games", requirement: "favorites_count", required: 10, icon: "📦", hint: null },
          { id: 7, name: "Ten Played", desc: "Play 10 games", requirement: "games_played", required: 10, icon: "🔟", hint: null },
          { id: 8, name: "Opinionated", desc: "Rate 25 games", requirement: "ratings_given", required: 25, icon: "🗣️", hint: null },
          { id: 9, name: "Devoted Fan", desc: "Favorite 25 games", requirement: "favorites_count", required: 25, icon: "💝", hint: null },
          { id: 10, name: "Newbie+", desc: "Get all Newbie achievements", requirement: "categoryComplete", required: "newbie", icon: "🌟", hint: null }
        ]
      }
    };
    
    // ===== STATE =====
    let currentUser = null;
    let localUser = null;
    let syncStatus = 'offline';
    let currentFilter = 'coins';
    let userAchievements = {};
    
    // ===== INIT =====
    async function init() {
      // Try to create guest user if none exists
      if (!localStorage.getItem('fanter_currentUser')) {
        const guestUser = {
          id: 'guest_' + Date.now(),
          username: 'Guest',
          displayName: 'Guest',
          coins: 300,
          stats: { gamesPlayed: 0, ratingsGiven: 0, favoritesCount: 0 },
          favorites: [],
          playedGames: []
        };
        localStorage.setItem('fanter_currentUser', JSON.stringify(guestUser));
      }
      
      const { data: { session } } = await window.supabase.auth.getSession();
      
      if (session) {
        currentUser = session.user;
        syncStatus = 'online';
        await loadSupabaseData();
      } else {
        loadLocalData();
      }
      
      setupTabs();
      setupLeaderboardFilters();
      updateUI();
      renderCurrentTab();
    }
    
    function loadLocalData() {
      localUser = JSON.parse(localStorage.getItem('fanter_currentUser') || 'null');
      userAchievements = JSON.parse(localStorage.getItem('fanter_achievements') || '{}');
      syncStatus = 'offline';
      console.log('Loaded local user:', localUser);
    }
    
    async function loadSupabaseData() {
      try {
        const { data: profile } = await window.supabase.from('profiles').select('*').eq('id', currentUser.id).single();
        if (profile) {
          localUser = {
            id: profile.id,
            username: profile.username,
            displayName: profile.display_name,
            email: profile.email,
            coins: profile.coins || 300,
            stats: {},
            favorites: [],
            playedGames: []
          };
        }
        
        const { data: achievements } = await window.supabase.from('user_achievements').select('achievement_id').eq('user_id', currentUser.id);
        userAchievements = {};
        achievements?.forEach(a => { userAchievements[a.achievement_id] = true; });
        
      } catch (error) {
        console.error('Error loading Supabase data:', error);
      }
    }
    
    // ===== AUTH =====
    async function handleLogin(email, password) {
      try {
        const { data, error } = await window.supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        
        currentUser = data.user;
        syncStatus = 'online';
        await loadSupabaseData();
        
        showMessage('loginMessage', 'Login successful!', 'success');
        setTimeout(() => window.location.reload(), 1000);
      } catch (error) {
        showMessage('loginMessage', error.message, 'error');
      }
    }
    
    async function handleRegister(username, email, displayName, password) {
      try {
        const { data, error } = await window.supabase.auth.signUp({
          email,
          password,
          options: { data: { username, display_name: displayName || username } }
        });
        
        if (error) throw error;
        
        if (data.user) {
          await window.supabase.from('profiles').insert({
            id: data.user.id,
            username,
            display_name: displayName || username,
            email,
            coins: 300
          });
        }
        
        showMessage('registerMessage', 'Account created! Check your email.', 'success');
      } catch (error) {
        showMessage('registerMessage', error.message, 'error');
      }
    }
    
    async function handleLogout() {
      await window.supabase.auth.signOut();
      currentUser = null;
      syncStatus = 'offline';
      loadLocalData();
      updateUI();
      switchTab('profile');
    }
    
    function continueWithLocalStorage() {
      loadLocalData();
      updateUI();
      switchTab('profile');
    }
    
    // ===== RENDERING =====
    function renderProfile() {
      const container = document.getElementById('profileContent');
      const user = localUser;
      
      if (!user) {
        container.innerHTML = `
          <div class="guest-message">
            <p>You're browsing as a guest</p>
            <button onclick="switchTab('register')" class="settings-btn" style="width:auto; padding:10px 30px;">create account</button>
          </div>
        `;
        return;
      }
      
      const displayName = user.displayName || user.username || 'User';
      const username = user.username || displayName.toLowerCase();
      const coins = user.coins || 300;
      const stats = user.stats || { gamesPlayed: 0, ratingsGiven: 0, favoritesCount: 0 };
      const favorites = user.favorites || [];
      const playedGames = user.playedGames || [];
      const unlockedCount = Object.keys(userAchievements).length;
      
      const statusDot = syncStatus === 'online' ? '🟢' : '🟠';
      const statusText = syncStatus === 'online' ? 'Supabase' : 'Local';
      
      container.innerHTML = `
        <div class="profile-info">
          <div class="profile-avatar">${displayName[0].toUpperCase()}</div>
          <h2>${displayName} <span class="sync-status ${syncStatus}">${statusDot} ${statusText}</span></h2>
          <p style="opacity:0.7;">@${username}</p>
          <div><span class="user-coins">💰 ${Math.floor(coins * 100) / 100} coins</span></div>
        </div>
        
        <div class="profile-stats">
          <div class="stat"><div class="stat-number">${stats.gamesPlayed || 0}</div><div class="stat-label">Games</div></div>
          <div class="stat"><div class="stat-number">${stats.ratingsGiven || 0}</div><div class="stat-label">Ratings</div></div>
          <div class="stat"><div class="stat-number">${favorites.length}</div><div class="stat-label">Favorites</div></div>
          <div class="stat"><div class="stat-number">${unlockedCount}</div><div class="stat-label">Achievements</div></div>
        </div>
        
        <div class="divider"></div>
        
        <div style="display:flex; gap:10px;">
          <button class="settings-btn" onclick="switchTab('achievements')">view achievements</button>
          <button class="settings-btn logout-btn" onclick="handleLogout()">${currentUser ? 'Logout' : 'Clear'}</button>
        </div>
      `;
    }
    
    function renderAchievements() {
      const container = document.getElementById('achievementsContent');
      
      if (!localUser) {
        container.innerHTML = '<div class="guest-message">Please log in to view achievements</div>';
        return;
      }
      
      container.innerHTML = '<div class="guest-message">Achievements coming soon!</div>';
    }
    
    function renderLeaderboard() {
      const container = document.getElementById('leaderboardList');
      container.innerHTML = '<div class="guest-message">Leaderboard coming soon!</div>';
    }
    
    // ===== UI HELPERS =====
    function setupTabs() {
      document.querySelectorAll('.account-tab').forEach(tab => {
        tab.addEventListener('click', () => switchTab(tab.getAttribute('data-tab')));
      });
      
      document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        await handleLogin(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
      });
      
      document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const pw = document.getElementById('regPassword').value;
        if (pw !== document.getElementById('regConfirmPassword').value) {
          showMessage('registerMessage', 'Passwords do not match', 'error');
          return;
        }
        await handleRegister(
          document.getElementById('regUsername').value,
          document.getElementById('regEmail').value,
          document.getElementById('regDisplayName').value,
          pw
        );
      });
    }
    
    function setupLeaderboardFilters() {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentFilter = btn.getAttribute('data-filter');
          renderLeaderboard();
        });
      });
    }
    
    function switchTab(tabName) {
      document.querySelectorAll('.account-tab').forEach(t => t.classList.toggle('active', t.getAttribute('data-tab') === tabName));
      document.querySelectorAll('.account-tab-content').forEach(c => c.classList.toggle('active', c.id === `${tabName}Tab`));
      renderCurrentTab();
    }
    
    function renderCurrentTab() {
      const active = document.querySelector('.account-tab-content.active');
      if (!active) return;
      if (active.id === 'profileTab') renderProfile();
      else if (active.id === 'achievementsTab') renderAchievements();
      else if (active.id === 'leaderboardTab') renderLeaderboard();
    }
    
    function updateUI() {
      const nameEl = document.getElementById('accountName');
      const tabs = document.querySelectorAll('.account-tab');
      const user = localUser;
      
      if (user) {
        nameEl.textContent = user.displayName || user.username || 'User';
        tabs.forEach(t => { 
          if (t.getAttribute('data-tab') === 'login' || t.getAttribute('data-tab') === 'register') {
            t.style.display = 'none'; 
          }
        });
      } else {
        nameEl.textContent = 'Guest';
        tabs.forEach(t => t.style.display = 'block');
      }
    }
    
    function showMessage(elId, msg, type) {
      const el = document.getElementById(elId);
      if (el) { el.textContent = msg; el.className = `message ${type}`; }
    }
    
    window.switchTab = switchTab;
    window.handleLogout = handleLogout;
    window.continueWithLocalStorage = continueWithLocalStorage;
    
    init();
  </script>
</body>
</html>
