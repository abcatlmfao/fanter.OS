<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fanter | fantarena</title>
  <link rel="stylesheet" href="config/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0a0a1a, #0f0f2a, #1a0a2a); min-height: 100vh; color: white; }
    .fantarena-container { display: flex; height: 100vh; width: 100%; }
    .sidebar { width: 280px; background: rgba(10,15,30,0.95); backdrop-filter: blur(10px); border-right: 1px solid rgba(45,90,227,0.3); display: flex; flex-direction: column; padding: 20px 0; }
    .sidebar-header { padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar-header h2 { color: #ffcc00; font-weight: 700; font-size: 20px; display: flex; align-items: center; gap: 8px; }
    .server-list { padding: 15px; }
    .server-item { padding: 10px 15px; margin: 3px 0; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.7); font-weight: 500; }
    .server-item:hover, .server-item.active { background: rgba(45,90,227,0.3); color: white; }
    .server-item.active { border-left: 3px solid #ffcc00; }
    .friends-header { padding: 20px 20px 10px; color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 600; text-transform: uppercase; display: flex; justify-content: space-between; position: relative; }
    .add-friend-btn { background: none; border: none; color: #ffcc00; cursor: pointer; font-size: 18px; }
    .request-badge { position: absolute; top: 18px; right: 15px; background: #ff4444; color: white; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px; cursor: pointer; }
    .friend-item { padding: 8px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-radius: 8px; margin: 2px 10px; }
    .friend-item:hover { background: rgba(45,90,227,0.2); }
    .friend-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, #2d5ae3, #ffcc00); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
    .friend-info { flex: 1; }
    .friend-name { font-weight: 600; font-size: 14px; }
    .friend-status { font-size: 11px; color: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 5px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.online { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
    .status-dot.offline { background: #666; }
    .group-item { padding: 8px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-radius: 8px; margin: 2px 10px; color: rgba(255,255,255,0.7); }
    .group-item:hover { background: rgba(45,90,227,0.2); color: white; }
    .chat-main { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); }
    .chat-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 15px; }
    .chat-header h3 { font-weight: 700; color: #ffcc00; }
    .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .message { display: flex; align-items: flex-start; gap: 14px; position: relative; }
    .message:hover { background: rgba(255,255,255,0.02); }
    .message:hover .message-actions { opacity: 1; }
    .message-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #2d5ae3, #ffcc00); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; cursor: pointer; }
    .message-content { flex: 1; }
    .message-header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; flex-wrap: wrap; }
    .message-name { font-weight: 700; color: #ffcc00; cursor: pointer; }
    .message-time { font-size: 11px; color: rgba(255,255,255,0.4); }
    .message-edited { font-size: 10px; color: rgba(255,255,255,0.3); margin-left: 5px; }
    .message-text { color: rgba(255,255,255,0.95); word-break: break-word; line-height: 1.4; }
    .message-text b, .message-text strong { font-weight: 700; color: white; }
    .message-text i, .message-text em { font-style: italic; }
    .message-text s, .message-text del { text-decoration: line-through; opacity: 0.7; }
    .message-text code { background: rgba(0,0,0,0.3); padding: 2px 5px; border-radius: 5px; font-family: monospace; }
    .reply-preview { background: rgba(45,90,227,0.2); border-left: 3px solid #ffcc00; padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; font-size: 12px; }
    .message-actions { display: flex; gap: 5px; position: absolute; right: 0; top: -10px; background: rgba(20,30,50,0.98); border: 1px solid rgba(45,90,227,0.3); border-radius: 20px; padding: 4px 8px; opacity: 0; }
    .message-action-btn { background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; font-size: 12px; padding: 2px 6px; }
    .message-action-btn:hover { background: rgba(45,90,227,0.3); color: white; }
    .typing-indicator { padding: 8px 20px; color: rgba(255,255,255,0.4); font-size: 12px; font-style: italic; }
    .message-input-container { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
    .reply-bar { background: rgba(45,90,227,0.2); padding: 8px 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .reply-bar span { color: rgba(255,255,255,0.7); font-size: 12px; }
    .reply-bar button { background: none; border: none; color: #ff6666; cursor: pointer; }
    .input-row { display: flex; gap: 10px; align-items: center; }
    #messageInput { flex: 1; padding: 14px 18px; border-radius: 30px; border: 1px solid rgba(45,90,227,0.4); background: rgba(0,0,0,0.3); color: white; font-size: 14px; outline: none; }
    #messageInput:focus { border-color: #ffcc00; }
    .format-btn, .emoji-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 10px 15px; color: white; cursor: pointer; font-size: 18px; }
    .format-btn:hover, .emoji-btn:hover { background: rgba(45,90,227,0.3); border-color: #ffcc00; }
    .send-btn { background: linear-gradient(135deg, #2d5ae3, #1a3a8a); border: none; border-radius: 30px; padding: 14px 28px; color: white; font-weight: 600; cursor: pointer; }
    .send-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(45,90,227,0.5); }
    .emoji-picker { position: absolute; bottom: 100px; right: 20px; background: rgba(20,30,50,0.98); border: 1px solid rgba(45,90,227,0.4); border-radius: 15px; padding: 15px; display: none; grid-template-columns: repeat(8, 1fr); gap: 8px; z-index: 100; max-height: 300px; overflow-y: auto; }
    .emoji-picker.show { display: grid; }
    .emoji-picker span { font-size: 24px; cursor: pointer; padding: 5px; text-align: center; }
    .emoji-picker span:hover { transform: scale(1.2); background: rgba(255,255,255,0.1); border-radius: 8px; }
    .mention-suggestions { position: absolute; bottom: 120px; left: 20px; background: rgba(20,30,50,0.98); border: 1px solid rgba(45,90,227,0.4); border-radius: 10px; max-height: 200px; overflow-y: auto; display: none; z-index: 100; min-width: 200px; }
    .mention-suggestions.show { display: block; }
    .mention-item { padding: 10px 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
    .mention-item:hover { background: rgba(45,90,227,0.3); }
    .members-sidebar { width: 260px; background: rgba(10,15,30,0.95); backdrop-filter: blur(10px); border-left: 1px solid rgba(45,90,227,0.3); padding: 20px; }
    .members-header { margin-bottom: 20px; color: #ffcc00; font-weight: 700; display: flex; justify-content: space-between; }
    .member-category { color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 600; text-transform: uppercase; margin: 15px 0 8px; }
    .member-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; color: rgba(255,255,255,0.8); font-weight: 500; cursor: pointer; }
    .member-item:hover { color: white; }
    .member-avatar { width: 32px; height: 32px; background: linear-gradient(135deg, #2d5ae3, #ffcc00); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
    .member-activity { font-size: 10px; color: rgba(255,255,255,0.4); margin-left: 5px; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; display: none; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: rgba(20,30,50,0.98); border: 1px solid rgba(45,90,227,0.4); border-radius: 20px; padding: 25px; max-width: 400px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal h3 { color: #ffcc00; margin-bottom: 20px; }
    .modal input, .modal textarea { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid rgba(45,90,227,0.4); background: rgba(0,0,0,0.3); color: white; margin-bottom: 15px; }
    .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; }
    .accept-btn { background: #00ff88; border: none; border-radius: 8px; padding: 6px 12px; color: #1a1a2e; font-weight: 600; cursor: pointer; }
    .decline-btn { background: #ff4444; border: none; border-radius: 8px; padding: 6px 12px; color: white; font-weight: 600; cursor: pointer; }
    .notification-badge { position: fixed; bottom: 20px; right: 20px; background: #ff4444; color: white; padding: 12px 20px; border-radius: 30px; font-weight: 600; cursor: pointer; z-index: 1000; animation: slideIn 0.3s; display: none; }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body>
<div class="fantarena-container">
  <div class="sidebar">
    <div class="sidebar-header"><h2>🏟️ FANTARENA</h2></div>
    <div class="server-list">
      <div class="server-item active" data-channel="general"><span>💬</span> general</div>
      <div class="server-item" data-channel="game-recs"><span>🎮</span> game-recs</div>
      <div class="server-item" data-channel="lfg"><span>👥</span> looking-for-group</div>
      <div class="server-item" data-channel="flex"><span>🏆</span> achievement-flex</div>
    </div>
    <div class="friends-header"><span>👥 friends</span><button class="add-friend-btn" onclick="showAddFriendModal()">+</button><span class="request-badge" id="requestBadge" style="display:none;" onclick="showRequestsModal()">0</span></div>
    <div id="friendsList"></div>
    <div class="friends-header" style="margin-top:10px;"><span>👥 groups</span><button class="add-friend-btn" onclick="showCreateGroupModal()">+</button></div>
    <div id="groupsList"></div>
    <div style="margin-top: auto; padding: 20px;">
      <button onclick="window.location.href='index.html'" class="send-btn" style="width:100%; padding:10px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);">← back</button>
    </div>
  </div>
  
  <div class="chat-main">
    <div class="chat-header"><h3 id="chatHeaderTitle"># general</h3><span class="chat-header-info" id="chatHeaderInfo"></span></div>
    <div class="messages-container" id="messagesContainer"><div style="text-align:center; color:rgba(255,255,255,0.4);">loading messages...</div></div>
    <div class="typing-indicator" id="typingIndicator"></div>
    <div class="message-input-container">
      <div class="reply-bar" id="replyBar" style="display:none;"><span id="replyText">Replying to...</span><button onclick="cancelReply()">✕</button></div>
      <div class="input-row">
        <button class="format-btn" onclick="applyFormat('**')">B</button>
        <button class="format-btn" onclick="applyFormat('*')"><i>I</i></button>
        <button class="format-btn" onclick="applyFormat('~~')"><s>S</s></button>
        <button class="format-btn" onclick="applyFormat('`')">&lt;/&gt;</button>
        <button class="emoji-btn" onclick="toggleEmojiPicker()">😊</button>
        <input type="text" id="messageInput" placeholder="send a message..." onkeypress="handleKeyPress(event)" oninput="handleTyping()">
        <button class="send-btn" onclick="sendMessage()">send</button>
      </div>
    </div>
    <div class="emoji-picker" id="emojiPicker"></div>
    <div class="mention-suggestions" id="mentionSuggestions"></div>
  </div>
  
  <div class="members-sidebar">
    <div class="members-header"><span>👥 members</span><span id="onlineCount">0 online</span></div>
    <div id="membersList"></div>
    <button class="send-btn" onclick="showProfileModal()" style="width:100%; margin-top:20px; padding:10px;">edit profile</button>
  </div>
</div>

<div class="notification-badge" id="notificationBadge" onclick="openDMFromNotification()"></div>

<!-- Modals -->
<div class="modal-overlay" id="addFriendModal" onclick="if(event.target===this)closeAddFriendModal()"><div class="modal"><h3>add friend</h3><input type="text" id="friendUsernameInput" placeholder="enter username"><div class="modal-buttons"><button class="send-btn" onclick="sendFriendRequest()" style="padding:10px 20px;">send</button><button class="send-btn" onclick="closeAddFriendModal()" style="padding:10px 20px; background:rgba(255,255,255,0.1);">cancel</button></div></div></div>
<div class="modal-overlay" id="requestsModal"><div class="modal"><h3>friend requests</h3><div id="requestsList"></div><div class="modal-buttons"><button class="send-btn" onclick="closeRequestsModal()">close</button></div></div></div>
<div class="modal-overlay" id="createGroupModal"><div class="modal"><h3>create group</h3><input type="text" id="groupNameInput" placeholder="group name"><div class="modal-buttons"><button class="send-btn" onclick="createGroup()">create</button><button class="send-btn" onclick="closeCreateGroupModal()" style="background:rgba(255,255,255,0.1);">cancel</button></div></div></div>
<div class="modal-overlay" id="profileModal"><div class="modal"><h3>your profile</h3><input type="text" id="profileBioInput" placeholder="bio" value="Just a gamer"><input type="text" id="profileStatusInput" placeholder="custom status" value="🎮 gaming"><div class="modal-buttons"><button class="send-btn" onclick="saveProfile()">save</button><button class="send-btn" onclick="closeProfileModal()" style="background:rgba(255,255,255,0.1);">cancel</button></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://luxutkabqgitoteosctr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1eHV0a2FicWdpdG90ZW9zY3RyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2Mjc5NjAsImV4cCI6MjA5MjIwMzk2MH0.7GjvQMZaujg0YFmTBr2wotGWCIUoBWCBplGocMo6TDM";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = JSON.parse(localStorage.getItem('fanter_currentUser') || 'null');
let currentChannel = 'general', currentDM = null, currentGroup = null, messages = [], friends = [], groups = [], members = [];
let typingTimeout = null, typingUsers = new Map(), replyingTo = null, lastMentionCheck = 0, notificationQueue = [];

if (!currentUser || currentUser.username === 'Guest') { alert('please log in!'); window.location.href = 'fantaccount.html'; }

// ===== PRESENCE & ACTIVITY =====
async function updatePresence(status = 'online', activity = null) { 
  try { 
    await supabaseClient.from('fanter_presence').upsert({ user_id: currentUser.id, username: currentUser.displayName || currentUser.username, status, activity, last_seen: new Date() }); 
  } catch (e) {} 
}
updatePresence(); setInterval(() => updatePresence('online', currentChannel ? `in #${currentChannel}` : 'in fantarena'), 30000);
window.addEventListener('beforeunload', () => updatePresence('offline', null));

// ===== MESSAGES =====
async function loadMessages() {
  let query = supabaseClient.from('fanter_chat').select('*').order('created_at', { ascending: true }).limit(100);
  if (currentDM) query = query.eq('channel_id', `dm_${[currentUser.id, currentDM].sort().join('_')}`);
  else if (currentGroup) query = query.eq('channel_id', `group_${currentGroup}`);
  else query = query.eq('channel_id', currentChannel);
  const { data } = await query;
  if (data) { messages = data; renderMessages(); }
}

function renderMessages() {
  const container = document.getElementById('messagesContainer');
  if (messages.length === 0) { container.innerHTML = '<div style="text-align:center; color:rgba(255,255,255,0.4);">no messages yet. say something!</div>'; return; }
  container.innerHTML = messages.map(msg => {
    const isMe = msg.user_id === currentUser.id;
    return `<div class="message"><div class="message-avatar" onclick="showProfile('${msg.user_id}')">${msg.username[0].toUpperCase()}</div><div class="message-content">
      ${msg.reply_to ? `<div class="reply-preview">↪ replying...</div>` : ''}
      <div class="message-header"><span class="message-name">${msg.username}</span><span class="message-time">${new Date(msg.created_at).toLocaleTimeString()}</span>${msg.edited ? '<span class="message-edited">(edited)</span>' : ''}</div>
      <div class="message-text">${formatMessage(msg.message)}</div>
      ${isMe ? `<div class="message-actions"><button class="message-action-btn" onclick="editMessage('${msg.id}', \`${msg.message.replace(/`/g,'\\`').replace(/'/g,"\\'")}\`)">✏️</button><button class="message-action-btn" onclick="deleteMessage('${msg.id}')">🗑️</button><button class="message-action-btn" onclick="replyToMessage('${msg.id}', '${msg.username}', '${msg.message.substring(0,30)}')">↩️</button></div>` : `<div class="message-actions"><button class="message-action-btn" onclick="replyToMessage('${msg.id}', '${msg.username}', '${msg.message.substring(0,30)}')">↩️</button></div>`}
    </div></div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

function formatMessage(text) {
  return text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\*(.*?)\*/g, '<i>$1</i>').replace(/~~(.*?)~~/g, '<s>$1</s>').replace(/`(.*?)`/g, '<code>$1</code>');
}

async function sendMessage() {
  const input = document.getElementById('messageInput'); 
  let message = input.value.trim(); 
  if (!message) return;
  
  const channelId = currentDM ? `dm_${[currentUser.id, currentDM].sort().join('_')}` : currentGroup ? `group_${currentGroup}` : currentChannel;
  await supabaseClient.from('fanter_chat').insert({ user_id: currentUser.id, username: currentUser.displayName || currentUser.username, message, channel_id: channelId, reply_to: replyingTo?.id || null });
  
  // Send notification if DM
  if (currentDM) { showNotification(`New message from ${currentUser.displayName}`, currentDM); }
  
  input.value = ''; cancelReply(); clearTyping();
}

function applyFormat(wrapper) {
  const input = document.getElementById('messageInput');
  const start = input.selectionStart, end = input.selectionEnd;
  const text = input.value;
  const selected = text.substring(start, end);
  input.value = text.substring(0, start) + wrapper + selected + wrapper + text.substring(end);
  input.focus();
  input.setSelectionRange(start + wrapper.length, end + wrapper.length);
}

// ===== NOTIFICATIONS =====
function showNotification(message, fromUserId) {
  notificationQueue.push({ message, fromUserId, time: Date.now() });
  const badge = document.getElementById('notificationBadge');
  badge.textContent = `${message} from ${fromUserId}`;
  badge.style.display = 'block';
  badge.setAttribute('data-from', fromUserId);
  setTimeout(() => { if (notificationQueue.length <= 1) badge.style.display = 'none'; }, 5000);
}

function openDMFromNotification() {
  const badge = document.getElementById('notificationBadge');
  const fromUserId = badge.getAttribute('data-from');
  if (fromUserId) { openDM(fromUserId, 'User'); badge.style.display = 'none'; }
}

// ===== TYPING & REALTIME =====
function handleTyping() { if (typingTimeout) clearTimeout(typingTimeout); supabaseClient.channel('typing').send({ type: 'broadcast', event: 'typing', payload: { user: currentUser.displayName, channel: currentChannel } }); typingTimeout = setTimeout(clearTyping, 2000); }
function clearTyping() { supabaseClient.channel('typing').send({ type: 'broadcast', event: 'stop_typing', payload: { channel: currentChannel } }); }

function setupRealtime() {
  if (window.channelSubscription) supabaseClient.removeChannel(window.channelSubscription);
  let filter = currentDM ? `channel_id=eq.dm_${[currentUser.id, currentDM].sort().join('_')}` : currentGroup ? `channel_id=eq.group_${currentGroup}` : `channel_id=eq.${currentChannel}`;
  window.channelSubscription = supabaseClient.channel('fanter-chat')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'fanter_chat', filter }, payload => { messages.push(payload.new); renderMessages(); })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'fanter_chat', filter }, () => loadMessages())
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'fanter_chat', filter }, () => loadMessages())
    .on('broadcast', { event: 'typing' }, ({ payload }) => { if (payload.channel === currentChannel && payload.user !== currentUser.displayName) { typingUsers.set(payload.user, Date.now()); updateTypingIndicator(); } })
    .on('broadcast', { event: 'stop_typing' }, ({ payload }) => { if (payload.channel === currentChannel) { typingUsers.delete(payload.user); updateTypingIndicator(); } })
    .subscribe();
}

function updateTypingIndicator() {
  const now = Date.now(); let typing = [];
  for (let [user, time] of typingUsers) if (now - time < 3000) typing.push(user); else typingUsers.delete(user);
  document.getElementById('typingIndicator').textContent = typing.length === 0 ? '' : typing.length === 1 ? `${typing[0]} is typing...` : `${typing.length} people are typing...`;
}

// ===== CHANNELS, DMs, GROUPS =====
document.querySelectorAll('.server-item').forEach(item => item.addEventListener('click', () => {
  document.querySelectorAll('.server-item').forEach(i => i.classList.remove('active')); item.classList.add('active');
  currentChannel = item.dataset.channel; currentDM = null; currentGroup = null;
  document.getElementById('chatHeaderTitle').textContent = `# ${currentChannel}`; messages = []; loadMessages(); setupRealtime(); updatePresence('online', `in #${currentChannel}`);
}));

async function openDM(userId, username) { currentDM = userId; currentChannel = null; currentGroup = null; document.getElementById('chatHeaderTitle').textContent = `@${username}`; document.querySelectorAll('.server-item').forEach(i => i.classList.remove('active')); messages = []; loadMessages(); setupRealtime(); updatePresence('online', `in DM with ${username}`); }
async function openGroup(groupId, groupName) { currentGroup = groupId; currentDM = null; currentChannel = null; document.getElementById('chatHeaderTitle').textContent = `👥 ${groupName}`; document.querySelectorAll('.server-item').forEach(i => i.classList.remove('active')); messages = []; loadMessages(); setupRealtime(); updatePresence('online', `in ${groupName}`); }

// ===== MEMBERS & FRIENDS & GROUPS =====
async function loadMembers() {
  const { data } = await supabaseClient.from('fanter_presence').select('*').order('status', { ascending: false });
  if (data) { members = data; document.getElementById('onlineCount').textContent = `${data.filter(m => m.status === 'online').length} online`; document.getElementById('membersList').innerHTML = `<div class="member-category">online — ${data.filter(m => m.status === 'online').length}</div>${data.filter(m => m.status === 'online').map(m => `<div class="member-item" onclick="openDM('${m.user_id}','${m.username}')"><div class="member-avatar">${m.username[0].toUpperCase()}</div><span>${m.username}</span><span class="member-activity">${m.activity || ''}</span></div>`).join('')}<div class="member-category">offline</div>${data.filter(m => m.status !== 'online').map(m => `<div class="member-item" onclick="openDM('${m.user_id}','${m.username}')"><div class="member-avatar">${m.username[0].toUpperCase()}</div><span>${m.username}</span></div>`).join('')}`; }
}

async function loadFriends() {
  const { data } = await supabaseClient.from('fanter_friends').select('friend_id').eq('user_id', currentUser.id);
  if (data?.length) { const { data: friendsData } = await supabaseClient.from('fanter_presence').select('*').in('user_id', data.map(f => f.friend_id)); friends = friendsData || []; }
  document.getElementById('friendsList').innerHTML = friends.length ? friends.map(f => `<div class="friend-item" onclick="openDM('${f.user_id}','${f.username}')"><div class="friend-avatar">${f.username[0].toUpperCase()}</div><div class="friend-info"><div class="friend-name">${f.username}</div><div class="friend-status"><span class="status-dot ${f.status||'offline'}"></span>${f.status||'offline'}</div></div></div>`).join('') : '<div style="padding:20px;color:rgba(255,255,255,0.4);">no friends yet</div>';
}

async function loadGroups() {
  const { data } = await supabaseClient.from('fanter_groups').select('*').or(`owner_id.eq.${currentUser.id},members.cs.{${currentUser.id}}`);
  groups = data || [];
  document.getElementById('groupsList').innerHTML = groups.length ? groups.map(g => `<div class="group-item" onclick="openGroup('${g.id}','${g.name}')"><span>👥</span> ${g.name}</div>`).join('') : '<div style="padding:20px;color:rgba(255,255,255,0.4);">no groups yet</div>';
}

// ===== MODALS =====
function showAddFriendModal() { document.getElementById('addFriendModal').classList.add('show'); }
function closeAddFriendModal() { document.getElementById('addFriendModal').classList.remove('show'); }
function showCreateGroupModal() { document.getElementById('createGroupModal').classList.add('show'); }
function closeCreateGroupModal() { document.getElementById('createGroupModal').classList.remove('show'); }
function showProfileModal() { 
  const bio = localStorage.getItem('fanter_bio') || 'Just a gamer';
  const status = localStorage.getItem('fanter_status') || '🎮 gaming';
  document.getElementById('profileBioInput').value = bio;
  document.getElementById('profileStatusInput').value = status;
  document.getElementById('profileModal').classList.add('show'); 
}
function closeProfileModal() { document.getElementById('profileModal').classList.remove('show'); }
function saveProfile() {
  const bio = document.getElementById('profileBioInput').value;
  const status = document.getElementById('profileStatusInput').value;
  localStorage.setItem('fanter_bio', bio);
  localStorage.setItem('fanter_status', status);
  updatePresence('online', status);
  closeProfileModal();
}

async function createGroup() {
  const name = document.getElementById('groupNameInput').value.trim();
  if (!name) return alert('enter a group name');
  await supabaseClient.from('fanter_groups').insert({ name, owner_id: currentUser.id, members: [currentUser.id] });
  closeCreateGroupModal(); loadGroups();
}

// ===== FRIEND REQUESTS =====
async function sendFriendRequest() {
  const username = document.getElementById('friendUsernameInput').value.trim(); if (!username) return alert('enter a username');
  const { data: users } = await supabaseClient.from('fanter_presence').select('user_id,username').ilike('username', username);
  if (!users?.length) return alert('user not found');
  await supabaseClient.from('fanter_friend_requests').insert({ sender_id: currentUser.id, receiver_id: users[0].user_id });
  alert(`request sent to ${users[0].username}!`); closeAddFriendModal();
}

async function loadFriendRequests() {
  const { data } = await supabaseClient.from('fanter_friend_requests').select('*').eq('receiver_id', currentUser.id).eq('status', 'pending');
  if (data?.length) { document.getElementById('requestBadge').style.display = 'block'; document.getElementById('requestBadge').textContent = data.length; } 
  else { document.getElementById('requestBadge').style.display = 'none'; }
}

function showRequestsModal() {
  supabaseClient.from('fanter_friend_requests').select('*').eq('receiver_id', currentUser.id).eq('status', 'pending').then(({ data }) => {
    const container = document.getElementById('requestsList');
    if (!data?.length) { container.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.4);">no pending requests</div>'; }
    else { container.innerHTML = data.map(r => `<div class="request-item"><div class="request-info"><div class="request-name">${r.sender_id}</div></div><div class="request-buttons"><button class="accept-btn" onclick="acceptRequest('${r.id}','${r.sender_id}')">✓</button><button class="decline-btn" onclick="declineRequest('${r.id}')">✕</button></div></div>`).join(''); }
    document.getElementById('requestsModal').classList.add('show');
  });
}
function closeRequestsModal() { document.getElementById('requestsModal').classList.remove('show'); loadFriendRequests(); loadFriends(); }
async function acceptRequest(reqId, senderId) { 
  await supabaseClient.from('fanter_friend_requests').update({ status: 'accepted' }).eq('id', reqId); 
  await supabaseClient.from('fanter_friends').insert({ user_id: currentUser.id, friend_id: senderId }); 
  await supabaseClient.from('fanter_friends').insert({ user_id: senderId, friend_id: currentUser.id }); 
  closeRequestsModal(); 
}
async function declineRequest(reqId) { await supabaseClient.from('fanter_friend_requests').update({ status: 'rejected' }).eq('id', reqId); closeRequestsModal(); }

// ===== MESSAGE ACTIONS =====
async function editMessage(msgId, oldText) {
  const newText = prompt('Edit message:', oldText.replace(/\*\*|\*|~~|`/g, ''));
  if (newText && newText !== oldText) { await supabaseClient.from('fanter_chat').update({ message: newText, edited: true }).eq('id', msgId); loadMessages(); }
}
async function deleteMessage(msgId) { if (confirm('Delete message?')) { await supabaseClient.from('fanter_chat').delete().eq('id', msgId); loadMessages(); } }
function replyToMessage(id, username, preview) { replyingTo = { id, username, preview }; document.getElementById('replyBar').style.display = 'flex'; document.getElementById('replyText').textContent = `Replying to ${username}: ${preview}...`; document.getElementById('messageInput').focus(); }
function cancelReply() { replyingTo = null; document.getElementById('replyBar').style.display = 'none'; }

// ===== EMOJI =====
function toggleEmojiPicker() { document.getElementById('emojiPicker').classList.toggle('show'); }
function insertEmoji(emoji) { document.getElementById('messageInput').value += emoji; document.getElementById('emojiPicker').classList.remove('show'); document.getElementById('messageInput').focus(); }

// ===== MISC =====
function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }
function showProfile(userId) { alert('Profile: ' + userId); }

// ===== INIT =====
const emojis = ['😀','😁','😂','🤣','😊','😍','🥰','😎','🤔','😅','😭','😡','👍','👎','🔥','💀','🎮','🏆','⭐','💬','🪙','👑','🌟','✨','💕','🎉','🎁','🛒','⚙️','🏟️'];
document.getElementById('emojiPicker').innerHTML = emojis.map(e => `<span onclick="insertEmoji('${e}')">${e}</span>`).join('');

// Create groups table if not exists
supabaseClient.from('fanter_groups').select('count').then(async ({ error }) => {
  if (error) {
    await supabaseClient.rpc('create_groups_table'); // fallback - run SQL manually if needed
  }
});

loadMessages(); setupRealtime(); loadFriends(); loadGroups(); loadMembers(); loadFriendRequests();
setInterval(loadMembers, 10000); setInterval(loadFriendRequests, 30000);

window.sendMessage = sendMessage; window.handleKeyPress = handleKeyPress; window.handleTyping = handleTyping; window.applyFormat = applyFormat;
window.editMessage = editMessage; window.deleteMessage = deleteMessage; window.replyToMessage = replyToMessage; window.cancelReply = cancelReply;
window.showAddFriendModal = showAddFriendModal; window.closeAddFriendModal = closeAddFriendModal; window.sendFriendRequest = sendFriendRequest;
window.showRequestsModal = showRequestsModal; window.closeRequestsModal = closeRequestsModal; window.acceptRequest = acceptRequest; window.declineRequest = declineRequest;
window.showCreateGroupModal = showCreateGroupModal; window.closeCreateGroupModal = closeCreateGroupModal; window.createGroup = createGroup;
window.showProfileModal = showProfileModal; window.closeProfileModal = closeProfileModal; window.saveProfile = saveProfile;
window.openDM = openDM; window.openGroup = openGroup; window.showProfile = showProfile; 
window.toggleEmojiPicker = toggleEmojiPicker; window.insertEmoji = insertEmoji;
window.openDMFromNotification = openDMFromNotification;

console.log('🏟️ Fantarena loaded with Priority 2 features!');
</script>
