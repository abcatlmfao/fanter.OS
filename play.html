<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fanter | playing</title>
  <link rel="stylesheet" href="config/main.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0a1a, #0f0f2a, #1a0a2a);
      background-size: 400% 400%;
      animation: bgShift 15s ease infinite;
      font-family: 'Ubuntu', sans-serif;
      min-height: 100vh;
    }
    @keyframes bgShift {
      0% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
      100% { background-position: 0% 0%; }
    }
    .game-layout { display: flex; min-height: 100vh; }
    
    /* Side Menu */
    .game-sidebar {
      width: 280px;
      background: rgba(10, 15, 30, 0.9);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(45, 90, 227, 0.3);
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      transition: width 0.3s ease;
      z-index: 100;
    }
    .game-sidebar.collapsed { width: 60px; }
    .game-sidebar.collapsed .sidebar-content { display: none; }
    
    .sidebar-toggle {
      position: absolute;
      right: -12px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(45, 90, 227, 0.9);
      border: 1px solid rgba(255, 204, 0, 0.3);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      cursor: pointer;
      z-index: 101;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
    }
    .sidebar-toggle:hover { background: #ffcc00; color: #1a1a2e; transform: translateY(-50%) scale(1.1); }
    
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      text-align: center;
    }
    .sidebar-header h2 { color: #ffcc00; font-family: 'Orbitron', monospace; font-size: 18px; }
    .game-sidebar.collapsed .sidebar-header h2 { font-size: 0; }
    .game-sidebar.collapsed .sidebar-header h2::before { content: "🎮"; font-size: 24px; }
    
    .sidebar-card {
      background: rgba(20, 30, 50, 0.6);
      border: 1px solid rgba(45, 90, 227, 0.3);
      border-radius: 16px;
      margin: 15px;
      padding: 15px;
      transition: all 0.2s ease;
    }
    .sidebar-card:hover { border-color: rgba(255, 204, 0, 0.3); transform: translateY(-2px); }
    .card-icon { font-size: 24px; margin-bottom: 10px; text-align: center; }
    .card-title { font-size: 12px; color: #ffcc00; font-family: 'Orbitron', monospace; margin-bottom: 10px; text-align: center; }
    .coin-amount { font-size: 28px; font-weight: bold; color: #ffcc00; font-family: 'Orbitron', monospace; text-align: center; }
    .coin-label { font-size: 10px; color: rgba(255,255,255,0.5); text-align: center; }
    .playtime-value { font-size: 20px; font-weight: bold; color: #2d5ae3; font-family: 'Orbitron', monospace; text-align: center; }
    .game-name-display { text-align: center; font-size: 14px; word-break: break-word; color: white; }
    .sidebar-btn {
      width: 100%;
      background: rgba(45, 90, 227, 0.2);
      border: 1px solid rgba(45, 90, 227, 0.3);
      border-radius: 30px;
      padding: 10px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      margin-top: 10px;
    }
    .sidebar-btn:hover { background: rgba(45, 90, 227, 0.4); border-color: #ffcc00; transform: translateY(-2px); }
    
    /* Main Game Area */
    .game-main {
      flex: 1;
      margin-left: 280px;
      padding: 40px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: margin-left 0.3s ease;
    }
    .game-sidebar.collapsed ~ .game-main { margin-left: 60px; }
    
    .game-container {
      width: 100%;
      max-width: 1100px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 24px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(45, 90, 227, 0.3);
      overflow: hidden;
    }
    .game-header {
      background: rgba(10, 15, 30, 0.8);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(45, 90, 227, 0.3);
      flex-wrap: wrap;
      gap: 10px;
    }
    .game-name { font-size: 16px; font-weight: bold; color: #ffcc00; font-family: 'Orbitron', monospace; }
    .game-control-btn {
      background: rgba(20, 30, 50, 0.8);
      border: 1px solid rgba(45, 90, 227, 0.4);
      border-radius: 20px;
      padding: 5px 12px;
      color: white;
      font-size: 11px;
      cursor: pointer;
    }
    .game-control-btn:hover { border-color: #ffcc00; transform: translateY(-2px); }
    .game-wrapper { aspect-ratio: 16 / 9; width: 100%; background: #000; }
    .game-frame { width: 100%; height: 100%; border: none; }
    
    /* Loading Screen */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(10px);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      transition: opacity 0.5s ease;
    }
    .loading-overlay.hide { opacity: 0; visibility: hidden; pointer-events: none; }
    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(45, 90, 227, 0.3);
      border-top: 3px solid #2d5ae3;
      border-right: 3px solid #ffcc00;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-text { color: #00ff88; font-family: 'Orbitron', monospace; font-size: 14px; letter-spacing: 2px; }
    .loading-game-name { color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 15px; }
    
    @media (max-width: 768px) {
      .game-sidebar { width: 240px; }
      .game-main { margin-left: 240px; padding: 20px; }
      .game-sidebar.collapsed { width: 50px; }
      .game-sidebar.collapsed ~ .game-main { margin-left: 50px; }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">LOADING GAME...</div>
    <div class="loading-game-name" id="loadingGameName">Preparing fanter player</div>
  </div>

  <div class="game-layout">
    <div class="game-sidebar" id="gameSidebar">
      <div class="sidebar-toggle" id="sidebarToggle">◀</div>
      <div class="sidebar-header"><h2>fanter</h2></div>
      <div class="sidebar-content">
        <div class="sidebar-card">
          <div class="card-icon">🎮</div>
          <div class="card-title">now playing</div>
          <div class="game-name-display" id="gameNameDisplay">Loading...</div>
        </div>
        <div class="sidebar-card">
          <div class="card-icon">🪙</div>
          <div class="card-title">your coins</div>
          <div class="coin-amount" id="coinAmount">0</div>
          <div class="coin-label">earned this session</div>
          <div class="coin-label" style="font-size: 9px;">+0.01 per second</div>
        </div>
        <div class="sidebar-card">
          <div class="card-icon">⏱️</div>
          <div class="card-title">session time</div>
          <div class="playtime-value" id="playtimeDisplay">00:00:00</div>
        </div>
        <div class="sidebar-card">
          <div class="card-icon">🛒</div>
          <div class="card-title">shop</div>
          <button class="sidebar-btn" onclick="alert('🪙 Shop coming soon!')">visit shop →</button>
        </div>
        <div class="sidebar-card">
          <div class="card-icon">🔗</div>
          <div class="card-title">links</div>
          <button class="sidebar-btn" onclick="window.location.href='index.html'">← back to games</button>
          <button class="sidebar-btn" onclick="window.location.href='fantaccount.html'">👤 my account</button>
        </div>
      </div>
    </div>
    
    <div class="game-main">
      <div class="game-container" id="gameContainer">
        <div class="game-header">
          <span class="game-name" id="gameTitle">Loading game...</span>
          <div class="game-controls">
            <button class="game-control-btn" id="fullscreenBtn">🖥️ fullscreen</button>
            <button class="game-control-btn" id="refreshBtn">🔄 refresh</button>
          </div>
        </div>
        <div class="game-wrapper">
          <iframe class="game-frame" id="gameFrame" src="about:blank" allowfullscreen sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation"></iframe>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== GET GAME INFO FROM URL =====
    const urlParams = new URLSearchParams(window.location.search);
    let gameUrl = urlParams.get("gameurl");
    let gameName = urlParams.get("game") || "Game";
    const decodedGameName = decodeURIComponent(gameName);
    
    console.log("🔍 Raw gameUrl param:", gameUrl);
    console.log("📝 Game name:", decodedGameName);
    
    // Check if gameUrl is missing
    if (!gameUrl || gameUrl === 'undefined' || gameUrl === 'null' || gameUrl === '') {
      document.getElementById('loadingOverlay').innerHTML = `
        <div style="text-align: center; padding: 40px;">
          <div style="font-size: 64px; margin-bottom: 20px;">😵</div>
          <div style="font-size: 24px; color: #ff4444; margin-bottom: 10px;">Game URL Not Found</div>
          <div style="color: rgba(255,255,255,0.7); margin-bottom: 20px;">No game URL was provided. Please go back and try again.</div>
          <button class="sidebar-btn" onclick="window.location.href='index.html'" style="width: auto; padding: 10px 20px;">← back to games</button>
        </div>
      `;
    } else {
      // Determine if external or internal game
      const isExternal = gameUrl.startsWith('http://') || gameUrl.startsWith('https://');
      
      let embedUrl;
      if (isExternal) {
        // External game - load directly
        embedUrl = gameUrl;
        console.log("🌐 External game - loading directly from:", embedUrl);
      } else {
        // Internal game - use CDN
        // Remove any trailing slashes
        let cleanUrl = gameUrl.replace(/\/$/, '');
        embedUrl = `https://gms.parcoil.com/${cleanUrl}`;
        console.log("🎮 Internal game - loading from CDN:", embedUrl);
      }
      
      // Update loading text
      const loadingGameNameEl = document.getElementById('loadingGameName');
      if (loadingGameNameEl) loadingGameNameEl.textContent = `Loading ${decodedGameName}...`;
      
      const gameFrame = document.getElementById('gameFrame');
      const loadingOverlay = document.getElementById('loadingOverlay');
      const gameContainer = document.getElementById('gameContainer');
      
      function onGameLoad() {
        console.log("✅ Game loaded successfully!");
        if (loadingOverlay) loadingOverlay.classList.add('hide');
      }
      
      if (gameFrame) {
        gameFrame.onload = onGameLoad;
        gameFrame.src = embedUrl;
        
        // Fallback timeout
        setTimeout(() => {
          if (loadingOverlay && !loadingOverlay.classList.contains('hide')) {
            console.log("⚠️ Game load timeout, forcing hide");
            onGameLoad();
          }
        }, 8000);
      }
      
      // Update UI
      const gameTitle = document.getElementById('gameTitle');
      const gameNameDisplay = document.getElementById('gameNameDisplay');
      if (gameTitle) gameTitle.textContent = decodedGameName;
      if (gameNameDisplay) gameNameDisplay.textContent = decodedGameName;
      
      // ===== SIDEBAR COLLAPSE =====
      let sidebarCollapsed = localStorage.getItem('sidebarCollapsed_play') === 'true';
      const sidebar = document.getElementById('gameSidebar');
      const toggleBtn = document.getElementById('sidebarToggle');
      
      function toggleSidebar() {
        sidebarCollapsed = !sidebarCollapsed;
        localStorage.setItem('sidebarCollapsed_play', sidebarCollapsed);
        if (sidebarCollapsed) {
          sidebar.classList.add('collapsed');
          if (toggleBtn) toggleBtn.innerHTML = '▶';
        } else {
          sidebar.classList.remove('collapsed');
          if (toggleBtn) toggleBtn.innerHTML = '◀';
        }
      }
      if (toggleBtn) toggleBtn.onclick = toggleSidebar;
      if (sidebarCollapsed) {
        sidebar.classList.add('collapsed');
        if (toggleBtn) toggleBtn.innerHTML = '▶';
      }
      
      // ===== COIN SYSTEM =====
      let sessionStartTime = Date.now();
      let totalCoinsEarned = 0;
      let coinInterval = null;
      let currentUser = JSON.parse(localStorage.getItem('fanter_currentUser') || 'null');
      
      function loadUserCoins() {
        if (currentUser && currentUser.coins !== undefined) totalCoinsEarned = currentUser.coins;
        const coinEl = document.getElementById('coinAmount');
        if (coinEl) coinEl.textContent = Math.floor(totalCoinsEarned * 100) / 100;
      }
      
      function saveUserCoins() {
        if (!currentUser) return;
        currentUser.coins = totalCoinsEarned;
        localStorage.setItem('fanter_currentUser', JSON.stringify(currentUser));
        let users = JSON.parse(localStorage.getItem('fanter_users') || '[]');
        const userIndex = users.findIndex(u => u.id === currentUser.id);
        if (userIndex !== -1) {
          users[userIndex].coins = totalCoinsEarned;
          localStorage.setItem('fanter_users', JSON.stringify(users));
        }
      }
      
      function updateCoinDisplay() {
        const coinEl = document.getElementById('coinAmount');
        if (coinEl) coinEl.textContent = Math.floor(totalCoinsEarned * 100) / 100;
      }
      
      function updatePlaytimeDisplay() {
        const elapsedSeconds = Math.floor((Date.now() - sessionStartTime) / 1000);
        const hours = Math.floor(elapsedSeconds / 3600);
        const minutes = Math.floor((elapsedSeconds % 3600) / 60);
        const seconds = elapsedSeconds % 60;
        const display = document.getElementById('playtimeDisplay');
        if (display) display.textContent = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      }
      
      function startCoinEarning() {
        if (coinInterval) clearInterval(coinInterval);
        coinInterval = setInterval(() => {
          if (!document.hidden) {
            totalCoinsEarned += 0.01;
            updateCoinDisplay();
            saveUserCoins();
          }
        }, 1000);
      }
      
      setInterval(updatePlaytimeDisplay, 1000);
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          if (coinInterval) clearInterval(coinInterval);
          coinInterval = null;
        } else {
          if (!coinInterval) startCoinEarning();
        }
      });
      
      loadUserCoins();
      startCoinEarning();
      window.addEventListener('beforeunload', () => saveUserCoins());
      
      // ===== FULLSCREEN =====
      const fullscreenBtn = document.getElementById('fullscreenBtn');
      const refreshBtn = document.getElementById('refreshBtn');
      let isFullscreen = false;
      
      function toggleFullscreen() {
        const gameContainerEl = document.getElementById('gameContainer');
        if (!isFullscreen) {
          gameContainerEl.classList.add('fullscreen');
          if (fullscreenBtn) fullscreenBtn.innerHTML = '⬛ exit';
          isFullscreen = true;
        } else {
          gameContainerEl.classList.remove('fullscreen');
          if (fullscreenBtn) fullscreenBtn.innerHTML = '🖥️ fullscreen';
          isFullscreen = false;
        }
      }
      if (fullscreenBtn) fullscreenBtn.onclick = toggleFullscreen;
      
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && isFullscreen) toggleFullscreen();
        // Safety key exit
        const safetyKey = localStorage.getItem('safetyKey');
        if (safetyKey && isFullscreen) {
          const pressedKey = e.key.toLowerCase();
          if (pressedKey === safetyKey.toLowerCase()) toggleFullscreen();
        }
      });
      
      if (refreshBtn) {
        refreshBtn.onclick = () => {
          if (gameFrame) {
            if (loadingOverlay) loadingOverlay.classList.remove('hide');
            gameFrame.src = embedUrl;
          }
        };
      }
      
      console.log('✅ Game player ready!');
    }
  </script>
</body>
</html>
