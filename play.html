<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fanter | playing</title>
  <link rel="stylesheet" href="config/main.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0a1a, #0f0f2a);
      min-height: 100vh;
      font-family: 'Ubuntu', sans-serif;
    }

    /* Game Container */
    .game-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
    }

    /* Top Bar */
    .top-bar {
      background: rgba(10, 15, 30, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(45, 90, 227, 0.3);
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .game-title {
      font-size: 18px;
      font-weight: bold;
      color: #ffcc00;
      font-family: 'Orbitron', monospace;
    }

    .stats {
      display: flex;
      gap: 20px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 18px;
      font-weight: bold;
      color: #2d5ae3;
      font-family: 'Orbitron', monospace;
    }

    .stat-label {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
    }

    .control-btn {
      background: rgba(20,30,50,0.8);
      border: 1px solid rgba(45,90,227,0.4);
      border-radius: 30px;
      padding: 8px 20px;
      color: white;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .control-btn:hover {
      border-color: #ffcc00;
      transform: translateY(-2px);
    }

    /* Game Wrapper */
    .game-wrapper {
      flex: 1;
      background: rgba(0,0,0,0.3);
      position: relative;
    }

    .game-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }

    /* Back Link */
    .back-link {
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      background: rgba(45,90,227,0.2);
      border-radius: 30px;
      font-size: 13px;
    }

    .back-link:hover {
      background: rgba(45,90,227,0.4);
    }

    /* Fullscreen */
    .game-wrapper.fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1000;
    }

    .fullscreen-active {
      background: rgba(255,204,0,0.2);
      border-color: #ffcc00;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="top-bar">
      <div class="game-title" id="gameTitle">Loading...</div>
      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="coinAmount">0</div>
          <div class="stat-label">🪙 coins</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="playtimeDisplay">00:00:00</div>
          <div class="stat-label">played</div>
        </div>
      </div>
      <div style="display: flex; gap: 10px;">
        <button class="control-btn" id="fullscreenBtn">🖥️ fullscreen</button>
        <a href="index.html" class="back-link">← back</a>
      </div>
    </div>
    
    <div class="game-wrapper" id="gameWrapper">
      <iframe class="game-frame" id="gameFrame" src="about:blank" allowfullscreen></iframe>
    </div>
  </div>

  <script>
    // ===== GET GAME INFO FROM URL =====
    const urlParams = new URLSearchParams(window.location.search);
    let gameUrl = urlParams.get("gameurl");
    let gameName = urlParams.get("game") || "Game";

    console.log("🔍 Game URL param:", gameUrl);
    console.log("📝 Game name:", gameName);

    // Fix the game URL
    let embedUrl;
    if (gameUrl && gameUrl.startsWith('http')) {
      embedUrl = gameUrl;
    } else if (gameUrl) {
      embedUrl = `https://gms.parcoil.com/${gameUrl}`;
    } else {
      embedUrl = 'about:blank';
      alert('No game URL provided!');
    }

    console.log("🎮 Loading embed URL:", embedUrl);
    
    // Load the game
    const gameFrame = document.getElementById('gameFrame');
    if (gameFrame) {
      gameFrame.src = embedUrl;
    }
    
    document.getElementById('gameTitle').textContent = `🎮 ${decodeURIComponent(gameName)}`;

    // ===== COIN SYSTEM =====
    let sessionStartTime = Date.now();
    let totalCoinsEarned = 0;
    let coinInterval = null;
    let currentUser = JSON.parse(localStorage.getItem('fanter_currentUser') || 'null');
    
    function loadUserCoins() {
      if (currentUser && currentUser.coins !== undefined) {
        totalCoinsEarned = currentUser.coins;
      }
      updateCoinDisplay();
    }
    
    function saveUserCoins() {
      if (currentUser) {
        currentUser.coins = totalCoinsEarned;
        localStorage.setItem('fanter_currentUser', JSON.stringify(currentUser));
        let users = JSON.parse(localStorage.getItem('fanter_users') || '[]');
        const userIndex = users.findIndex(u => u.id === currentUser.id);
        if (userIndex !== -1) {
          users[userIndex].coins = totalCoinsEarned;
          localStorage.setItem('fanter_users', JSON.stringify(users));
        }
      }
    }
    
    function updateCoinDisplay() {
      const coinEl = document.getElementById('coinAmount');
      if (coinEl) {
        coinEl.textContent = Math.floor(totalCoinsEarned * 100) / 100;
      }
    }
    
    function updatePlaytimeDisplay() {
      const elapsedSeconds = Math.floor((Date.now() - sessionStartTime) / 1000);
      const hours = Math.floor(elapsedSeconds / 3600);
      const minutes = Math.floor((elapsedSeconds % 3600) / 60);
      const seconds = elapsedSeconds % 60;
      const display = document.getElementById('playtimeDisplay');
      if (display) {
        display.textContent = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      }
    }
    
    function startCoinEarning() {
      if (coinInterval) clearInterval(coinInterval);
      coinInterval = setInterval(() => {
        if (!document.hidden) {
          totalCoinsEarned += 0.01;
          updateCoinDisplay();
          saveUserCoins();
        }
      }, 1000);
    }
    
    setInterval(updatePlaytimeDisplay, 1000);
    
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        if (coinInterval) clearInterval(coinInterval);
        coinInterval = null;
      } else {
        if (!coinInterval) startCoinEarning();
      }
    });
    
    loadUserCoins();
    startCoinEarning();
    
    window.addEventListener('beforeunload', () => {
      saveUserCoins();
    });
    
    // ===== FULLSCREEN TOGGLE =====
    const gameWrapper = document.getElementById('gameWrapper');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    let isFullscreen = false;
    
    function toggleFullscreen() {
      if (!isFullscreen) {
        gameWrapper.classList.add('fullscreen');
        fullscreenBtn.innerHTML = '⬛ exit';
        fullscreenBtn.classList.add('fullscreen-active');
        isFullscreen = true;
      } else {
        gameWrapper.classList.remove('fullscreen');
        fullscreenBtn.innerHTML = '🖥️ fullscreen';
        fullscreenBtn.classList.remove('fullscreen-active');
        isFullscreen = false;
      }
    }
    
    fullscreenBtn.onclick = toggleFullscreen;
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && isFullscreen) {
        toggleFullscreen();
      }
    });
    
    console.log('✅ Game player ready!');
  </script>
</body>
</html>
