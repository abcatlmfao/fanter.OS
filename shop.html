<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fanter | shop</title>
  <link rel="stylesheet" href="config/main.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0a1a, #0f0f2a, #1a0a2a);
      background-size: 400% 400%;
      animation: bgShift 15s ease infinite;
      font-family: 'Ubuntu', sans-serif;
      min-height: 100vh;
    }

    @keyframes bgShift {
      0% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
      100% { background-position: 0% 0%; }
    }

    /* Shop Container */
    .shop-container {
      max-width: 1200px;
      margin: 100px auto;
      padding: 20px;
    }

    /* Shop Header */
    .shop-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(10, 15, 30, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(45, 90, 227, 0.3);
      border-radius: 20px;
      padding: 15px 25px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .shop-title {
      font-size: 28px;
      color: #ffcc00;
      font-family: 'Orbitron', monospace;
    }

    .coin-display {
      background: linear-gradient(135deg, rgba(255,204,0,0.2), rgba(255,204,0,0.05));
      border: 1px solid rgba(255,204,0,0.3);
      border-radius: 30px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .coin-icon {
      font-size: 24px;
    }

    .coin-amount {
      font-size: 24px;
      font-weight: bold;
      color: #ffcc00;
      font-family: 'Orbitron', monospace;
    }

    .coin-label {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }

    /* Category Tabs */
    .shop-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .shop-tab {
      background: rgba(20, 30, 50, 0.8);
      border: 1px solid rgba(45, 90, 227, 0.4);
      border-radius: 30px;
      padding: 10px 25px;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Orbitron', monospace;
    }

    .shop-tab:hover {
      border-color: #ffcc00;
      transform: translateY(-2px);
    }

    .shop-tab.active {
      background: linear-gradient(135deg, rgba(45,90,227,0.3), rgba(255,204,0,0.1));
      border-color: #ffcc00;
      color: #ffcc00;
    }

    /* Shop Items Grid */
    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    /* Shop Item Card */
    .shop-item {
      background: rgba(20, 30, 50, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(45, 90, 227, 0.3);
      border-radius: 20px;
      padding: 20px;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .shop-item:hover {
      transform: translateY(-5px);
      border-color: rgba(255, 204, 0, 0.5);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .shop-item.owned {
      border-color: rgba(0, 255, 0, 0.5);
      background: rgba(0, 255, 0, 0.05);
    }

    .shop-item.equipped {
      border-color: #ffcc00;
      background: linear-gradient(135deg, rgba(255,204,0,0.1), rgba(255,204,0,0.02));
    }

    .item-preview {
      width: 100%;
      height: 120px;
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
      font-size: 48px;
    }

    .item-name {
      font-size: 16px;
      font-weight: bold;
      color: white;
      margin-bottom: 5px;
      font-family: 'Orbitron', monospace;
    }

    .item-desc {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 15px;
    }

    .item-price {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 15px;
    }

    .price-icon {
      font-size: 16px;
    }

    .price-amount {
      font-size: 18px;
      font-weight: bold;
      color: #ffcc00;
    }

    .shop-btn {
      width: 100%;
      background: rgba(45, 90, 227, 0.3);
      border: 1px solid rgba(45, 90, 227, 0.4);
      border-radius: 30px;
      padding: 10px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .shop-btn:hover:not(:disabled) {
      background: rgba(45, 90, 227, 0.6);
      border-color: #ffcc00;
      transform: translateY(-2px);
    }

    .shop-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .shop-btn.equip {
      background: rgba(255, 204, 0, 0.2);
      border-color: #ffcc00;
      color: #ffcc00;
    }

    .shop-btn.equipped {
      background: rgba(0, 255, 0, 0.2);
      border-color: #00ff88;
      color: #00ff88;
    }

    /* Owned badge */
    .owned-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,255,0,0.8);
      color: white;
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: bold;
    }

    /* Back button */
    .back-btn {
      background: rgba(20, 30, 50, 0.8);
      border: 1px solid rgba(45, 90, 227, 0.4);
      border-radius: 30px;
      padding: 8px 20px;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .back-btn:hover {
      border-color: #ffcc00;
      transform: translateY(-2px);
    }

    /* Notification */
    .shop-notification {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      border: 1px solid #ffcc00;
      border-radius: 30px;
      padding: 12px 24px;
      color: #ffcc00;
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      z-index: 10000;
      opacity: 0;
      transition: all 0.3s ease;
    }

    .shop-notification.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 768px) {
      .shop-container {
        margin: 80px auto;
        padding: 15px;
      }
      .shop-header {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <!-- Account Button -->
  <div class="account-btn-container">
    <button class="account-btn" id="accountBtn" onclick="window.location.href='fantaccount.html'">
      <span class="account-icon">👤</span>
      <span class="account-name" id="accountName">Guest</span>
    </button>
  </div>

  <div class="shop-container">
    <div class="shop-header">
      <div class="shop-title">🛒 ITEM SHOP</div>
      <div class="coin-display">
        <span class="coin-icon">🪙</span>
        <span class="coin-amount" id="coinAmount">0</span>
        <span class="coin-label">coins</span>
      </div>
      <button class="back-btn" onclick="window.location.href='index.html'">← back</button>
    </div>

    <!-- Category Tabs -->
    <div class="shop-tabs">
      <button class="shop-tab active" data-category="backgrounds">🎨 Backgrounds</button>
      <button class="shop-tab" data-category="cursors">🖱️ Cursors</button>
      <button class="shop-tab" data-category="themes">✨ Themes</button>
      <button class="shop-tab" data-category="presets">🎯 Presets</button>
      <button class="shop-tab" data-category="pets">🐾 Pets</button>
    </div>

    <!-- Shop Items Grid -->
    <div id="shopGrid" class="shop-grid">
      <!-- Items will be loaded here -->
    </div>
  </div>

  <!-- Notification -->
  <div id="shopNotification" class="shop-notification"></div>

  <script>
    // ===== SHOP DATA =====
    const SHOP_ITEMS = {
      backgrounds: [
        { id: "bg_chill", name: "Chill Cycle", desc: "Animated gradient cycle", icon: "🌈", price: 100, type: "background", value: "chill" },
        { id: "bg_parallax", name: "Parallax Stars", desc: "Floating starfield", icon: "🌌", price: 200, type: "background", value: "parallax" },
        { id: "bg_aurora", name: "Aurora Waves", desc: "Flowing northern lights", icon: "🌊", price: 300, type: "background", value: "aurora" },
        { id: "bg_void", name: "The Void", desc: "Pure darkness", icon: "🕳️", price: 150, type: "background", value: "void" },
        { id: "bg_neon", name: "Neon Grid", desc: "Cyberpunk city", icon: "💠", price: 500, type: "background", value: "neon" },
        { id: "bg_rainbow", name: "Rainbow Road", desc: "Colorful spectrum", icon: "🌈", price: 400, type: "background", value: "rainbow" }
      ],
      cursors: [
        { id: "cur_default", name: "Default", desc: "Classic cursor", icon: "🖱️", price: 0, type: "cursor", value: "default" },
        { id: "cur_glow", name: "Glow Orb", desc: "Glowing circle", icon: "🔵", price: 150, type: "cursor", value: "glow" },
        { id: "cur_gold", name: "Gold Star", desc: "Golden star cursor", icon: "⭐", price: 300, type: "cursor", value: "gold" },
        { id: "cur_neon", name: "Neon Trail", desc: "Neon green trail", icon: "💚", price: 450, type: "cursor", value: "neon" },
        { id: "cur_pixel", name: "Pixel Sword", desc: "Retro pixel blade", icon: "⚔️", price: 600, type: "cursor", value: "pixel" },
        { id: "cur_dragon", name: "Dragon Eye", desc: "Mystical dragon", icon: "🐉", price: 800, type: "cursor", value: "dragon" }
      ],
      themes: [
        { id: "theme_dark", name: "Dark Mode", desc: "Sleek dark theme", icon: "🌙", price: 200, type: "theme", value: "dark" },
        { id: "theme_light", name: "Light Mode", desc: "Clean bright theme", icon: "☀️", price: 200, type: "theme", value: "light" },
        { id: "theme_neon", name: "Neon City", desc: "Cyberpunk neon", icon: "💚", price: 500, type: "theme", value: "neon" },
        { id: "theme_rainbow", name: "Rainbow", desc: "Colorful explosion", icon: "🌈", price: 600, type: "theme", value: "rainbow" },
        { id: "theme_forest", name: "Forest Night", desc: "Mystic woods", icon: "🌲", price: 350, type: "theme", value: "forest" },
        { id: "theme_ocean", name: "Deep Ocean", desc: "Underwater realm", icon: "🌊", price: 350, type: "theme", value: "ocean" }
      ],
      presets: [
        { id: "preset_cool", name: "Cool Blue", desc: "All blue everything", icon: "💙", price: 100, type: "preset", value: { bg: "chill", accent: "#2d5ae3", font: "ubuntu" } },
        { id: "preset_warm", name: "Warm Sunset", desc: "Orange and gold", icon: "🧡", price: 100, type: "preset", value: { bg: "aurora", accent: "#ff8844", font: "ubuntu" } },
        { id: "preset_purple", name: "Purple Haze", desc: "Mystic purple", icon: "💜", price: 100, type: "preset", value: { bg: "void", accent: "#aa44ff", font: "orbitron" } },
        { id: "preset_gamer", name: "Gamer RGB", desc: "RGB everything", icon: "🎮", price: 250, type: "preset", value: { bg: "neon", accent: "#00ffcc", font: "rajdhani" } }
      ],
      pets: [
        { id: "pet_chinchilla", name: "Sir Chinchilla", desc: "Your loyal guide", icon: "🐹", price: 500, type: "pet", value: "chinchilla" },
        { id: "pet_dragon", name: "Baby Dragon", desc: "Fiery companion", icon: "🐉", price: 1000, type: "pet", value: "dragon" },
        { id: "pet_cat", name: "Space Cat", desc: "Interstellar feline", icon: "🐱", price: 750, type: "pet", value: "cat" },
        { id: "pet_dog", name: "Cyber Dog", desc: "Robotic pup", icon: "🐶", price: 750, type: "pet", value: "dog" },
        { id: "pet_owl", name: "Wise Owl", desc: "Ancient knowledge", icon: "🦉", price: 800, type: "pet", value: "owl" },
        { id: "pet_fox", name: "Fire Fox", desc: "Flame-tailed fox", icon: "🦊", price: 850, type: "pet", value: "fox" }
      ]
    };

    // Get user data
    let currentUser = JSON.parse(localStorage.getItem('fanter_currentUser') || 'null');
    let userInventory = JSON.parse(localStorage.getItem('fanter_inventory') || '{}');
    let equippedItems = JSON.parse(localStorage.getItem('fanter_equipped') || '{}');

    function updateCoinDisplay() {
      const coinEl = document.getElementById('coinAmount');
      if (coinEl && currentUser) {
        coinEl.textContent = Math.floor((currentUser.coins || 0) * 100) / 100;
      }
    }

    function showNotification(message) {
      const notif = document.getElementById('shopNotification');
      notif.textContent = message;
      notif.classList.add('show');
      setTimeout(() => {
        notif.classList.remove('show');
      }, 2000);
    }

    function purchaseItem(item) {
      if (!currentUser) {
        showNotification("❌ Please log in to purchase items!");
        window.location.href = 'fantaccount.html';
        return;
      }

      if (userInventory[item.id]) {
        showNotification(`✅ You already own ${item.name}!`);
        return;
      }

      if ((currentUser.coins || 0) < item.price) {
        showNotification(`❌ Not enough coins! Need ${item.price} 🪙`);
        return;
      }

      // Purchase
      currentUser.coins = (currentUser.coins || 0) - item.price;
      userInventory[item.id] = true;
      
      // Save to localStorage
      localStorage.setItem('fanter_currentUser', JSON.stringify(currentUser));
      localStorage.setItem('fanter_inventory', JSON.stringify(userInventory));
      
      // Update users array
      let users = JSON.parse(localStorage.getItem('fanter_users') || '[]');
      const userIndex = users.findIndex(u => u.id === currentUser.id);
      if (userIndex !== -1) {
        users[userIndex].coins = currentUser.coins;
        localStorage.setItem('fanter_users', JSON.stringify(users));
      }
      
      updateCoinDisplay();
      showNotification(`🎉 Purchased ${item.name}!`);
      renderShopItems(document.querySelector('.shop-tab.active').dataset.category);
    }

    function equipItem(item) {
      equippedItems[item.type] = item.value;
      localStorage.setItem('fanter_equipped', JSON.stringify(equippedItems));
      showNotification(`✨ Equipped ${item.name}!`);
      
      // Apply effect immediately
      applyItemEffect(item);
      renderShopItems(document.querySelector('.shop-tab.active').dataset.category);
    }

    function applyItemEffect(item) {
      switch(item.type) {
        case 'background':
          document.body.classList.remove('theme-bg-chill', 'theme-bg-parallax', 'theme-bg-solid', 'theme-bg-aurora', 'theme-bg-void');
          document.body.classList.add(`theme-bg-${item.value}`);
          break;
        case 'theme':
          document.body.classList.remove('theme-dark', 'theme-light', 'theme-neon', 'theme-rainbow');
          if (item.value !== 'chill') {
            document.body.classList.add(`theme-${item.value}`);
          }
          break;
        case 'preset':
          if (item.value.bg) {
            document.body.classList.remove('theme-bg-chill', 'theme-bg-parallax', 'theme-bg-solid', 'theme-bg-aurora', 'theme-bg-void');
            document.body.classList.add(`theme-bg-${item.value.bg}`);
          }
          if (item.value.accent) {
            document.documentElement.style.setProperty('--accent-color', item.value.accent);
          }
          break;
      }
    }

    function renderShopItems(category) {
      const grid = document.getElementById('shopGrid');
      const items = SHOP_ITEMS[category];
      if (!items) return;
      
      grid.innerHTML = '';
      
      items.forEach(item => {
        const owned = userInventory[item.id];
        const isEquipped = equippedItems[item.type] === item.value || 
                          (item.type === 'preset' && JSON.stringify(equippedItems[item.type]) === JSON.stringify(item.value));
        
        const itemDiv = document.createElement('div');
        itemDiv.className = `shop-item ${owned ? 'owned' : ''} ${isEquipped ? 'equipped' : ''}`;
        
        itemDiv.innerHTML = `
          ${owned ? '<div class="owned-badge">✓ OWNED</div>' : ''}
          <div class="item-preview">${item.icon}</div>
          <div class="item-name">${item.name}</div>
          <div class="item-desc">${item.desc}</div>
          <div class="item-price">
            <span class="price-icon">🪙</span>
            <span class="price-amount">${item.price}</span>
          </div>
        `;
        
        const btn = document.createElement('button');
        btn.className = 'shop-btn';
        
        if (owned && isEquipped) {
          btn.textContent = '✓ EQUIPPED';
          btn.classList.add('equipped');
          btn.disabled = true;
        } else if (owned) {
          btn.textContent = '⚡ EQUIP';
          btn.classList.add('equip');
          btn.onclick = () => equipItem(item);
        } else {
          btn.textContent = `🪙 PURCHASE (${item.price})`;
          btn.onclick = () => purchaseItem(item);
        }
        
        itemDiv.appendChild(btn);
        grid.appendChild(itemDiv);
      });
    }

    // Tab switching
    document.querySelectorAll('.shop-tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.shop-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderShopItems(tab.dataset.category);
      };
    });

    // Load equipped items on page load
    function loadEquippedItems() {
      if (equippedItems.background) {
        document.body.classList.add(`theme-bg-${equippedItems.background}`);
      }
      if (equippedItems.theme && equippedItems.theme !== 'chill') {
        document.body.classList.add(`theme-${equippedItems.theme}`);
      }
      if (equippedItems.accent) {
        document.documentElement.style.setProperty('--accent-color', equippedItems.accent);
      }
    }

    // Update account button
    function updateAccountButton() {
      const accountNameSpan = document.getElementById('accountName');
      if (accountNameSpan) {
        accountNameSpan.textContent = currentUser ? (currentUser.displayName || currentUser.username) : 'Guest';
      }
    }

    // Initialize
    updateCoinDisplay();
    updateAccountButton();
    loadEquippedItems();
    renderShopItems('backgrounds');
  </script>
</body>
</html>
