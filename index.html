<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>fanterOS — game hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --accent: #5e7ce6;
      --accent-hover: #7c9eff;
      --accent-glow: rgba(94, 124, 230, 0.4);
      --bg-dark: #0c0c12;
      --window-bg: #1e1e2e;
      --window-header: #2a2a3a;
      --text: #eef2ff;
      --text-dim: #a0a8c0;
      --border: #2d2d44;
      --danger: #ff5e5e;
      --success: #4cd964;
      --gold: #ffcc00;
    }

    body {
      font-family: 'Ubuntu', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a10;
      overflow: hidden;
      height: 100vh;
      color: var(--text);
    }

    /* ===== DESKTOP ===== */
    .desktop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 50%, #0a0a12 100%);
      z-index: 0;
      overflow-y: auto;
      padding: 20px;
      transition: all 0.3s ease;
    }

    /* Custom scrollbar */
    .desktop::-webkit-scrollbar { width: 8px; }
    .desktop::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
    .desktop::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    .desktop::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* ===== TASKBAR (auto-hide) ===== */
    .taskbar {
      position: fixed;
      bottom: -60px;
      left: 0;
      right: 0;
      height: 52px;
      background: rgba(20, 22, 36, 0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 1000;
      transition: bottom 0.25s ease;
      font-size: 13px;
    }
    .taskbar.visible { bottom: 0; }
    .taskbar:hover { bottom: 0; }

    .start-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 18px;
      background: var(--accent);
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.15s;
    }
    .start-btn:hover { background: var(--accent-hover); transform: scale(1.02); }

    .taskbar-apps {
      display: flex;
      gap: 6px;
      flex: 1;
      margin-left: 20px;
      overflow-x: auto;
    }
    .taskbar-app {
      padding: 6px 14px;
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      white-space: nowrap;
    }
    .taskbar-app:hover { background: rgba(255,255,255,0.12); }
    .taskbar-app.active { background: var(--accent); }

    .taskbar-time {
      padding: 0 12px;
      color: var(--text-dim);
      font-family: monospace;
      font-size: 12px;
    }

    /* ===== START MENU ===== */
    .start-menu {
      position: fixed;
      bottom: 60px;
      left: 16px;
      width: 340px;
      background: rgba(28, 30, 45, 0.98);
      backdrop-filter: blur(24px);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      z-index: 1001;
      transform: translateY(20px);
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s ease;
      overflow: hidden;
    }
    .start-menu.open { transform: translateY(0); opacity: 1; visibility: visible; }

    .start-header {
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), #4a5ec9);
    }
    .start-header .user-name { font-weight: 600; font-size: 14px; }
    .start-header .user-status { font-size: 11px; opacity: 0.8; }

    .start-search { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .start-search input {
      width: 100%;
      padding: 8px 12px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: white;
      font-size: 13px;
      outline: none;
    }
    .start-search input:focus { border-color: var(--accent); }

    .start-apps {
      max-height: 380px;
      overflow-y: auto;
      padding: 8px;
    }
    .start-app {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
    }
    .start-app:hover { background: rgba(255,255,255,0.08); }
    .start-app-icon { font-size: 22px; width: 36px; text-align: center; }
    .start-app-name { font-size: 13px; flex: 1; }
    .start-app-desc { font-size: 10px; color: var(--text-dim); }

    /* ===== BOOT MENU (Ctrl+K) ===== */
    .boot-menu {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translate(-50%, -30%);
      width: 520px;
      max-width: 90vw;
      background: rgba(20, 22, 36, 0.98);
      backdrop-filter: blur(24px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.15);
      z-index: 10000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s ease;
      box-shadow: 0 24px 48px rgba(0,0,0,0.4);
    }
    .boot-menu.open { opacity: 1; visibility: visible; transform: translate(-50%, 0); }

    .boot-search { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .boot-search input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: white;
      font-size: 16px;
      outline: none;
    }
    .boot-search input:focus { border-color: var(--accent); }

    .boot-results { max-height: 380px; overflow-y: auto; padding: 12px; }
    .boot-result {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
    }
    .boot-result.selected { background: var(--accent); }
    .boot-result:hover:not(.selected) { background: rgba(255,255,255,0.08); }
    .boot-result-icon { font-size: 26px; }
    .boot-result-info { flex: 1; }
    .boot-result-name { font-weight: 500; }
    .boot-result-desc { font-size: 11px; color: var(--text-dim); }

    .boot-footer {
      padding: 10px 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      display: flex;
      justify-content: space-between;
    }

    /* ===== MAIN GAME HUB CONTENT (from original index) ===== */
    .game-hub {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Top bar with user and coins */
    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
      padding: 10px 20px;
    }
    .account-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 30px;
      padding: 8px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .account-btn:hover { background: rgba(255,255,255,0.15); border-color: var(--accent); }
    .coin-display {
      background: rgba(0,0,0,0.4);
      border-radius: 30px;
      padding: 8px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,204,0,0.3);
    }
    .coin-amount { color: var(--gold); font-weight: bold; font-size: 18px; }

    /* Title section */
    .center {
      text-align: center;
      margin: 20px 0;
    }
    .center h1 {
      font-size: 48px;
      background: linear-gradient(135deg, #fff, var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-family: 'Orbitron', monospace;
    }
    .center p { color: var(--text-dim); margin-top: 5px; }

    /* Game of the Day */
    .game-of-day {
      background: linear-gradient(135deg, rgba(255,204,0,0.1), rgba(94,124,230,0.1));
      border: 1px solid rgba(255,204,0,0.3);
      border-radius: 20px;
      padding: 15px 25px;
      margin: 20px auto;
      max-width: 600px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 15px;
    }
    .game-of-day-label span {
      background: var(--gold);
      color: #1a1200;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: bold;
    }
    .game-of-day-name { font-size: 18px; font-weight: bold; color: var(--gold); }
    .game-of-day-play {
      background: linear-gradient(135deg, var(--accent), #3a5ec9);
      border: none;
      border-radius: 30px;
      padding: 8px 24px;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    /* Search & Categories */
    .search-section {
      position: relative;
      display: flex;
      justify-content: center;
      margin: 20px auto;
      flex-wrap: wrap;
      gap: 15px;
    }
    #searchInput {
      width: 320px;
      padding: 12px 20px;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.3);
      color: white;
      font-size: 14px;
      outline: none;
    }
    #searchInput:focus { border-color: var(--accent); }

    .category-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 15px auto;
    }
    .cat-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 30px;
      padding: 8px 18px;
      color: white;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.1s;
    }
    .cat-btn:hover { background: rgba(255,255,255,0.12); }
    .cat-btn.active { background: var(--accent); border-color: var(--accent); }

    .sort-bar {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 10px auto;
    }
    .sort-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 30px;
      padding: 6px 14px;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
    }
    .sort-btn.active { background: var(--accent); color: white; }

    /* Games Grid - 5 columns */
    #gamesContainer {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
      padding: 20px;
      margin-top: 10px;
    }
    @media (max-width: 1100px) { #gamesContainer { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 800px) { #gamesContainer { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 550px) { #gamesContainer { grid-template-columns: repeat(2, 1fr); } }

    /* Game Card */
    .game {
      background: rgba(30, 32, 46, 0.9);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .game:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
    .game-image-container { aspect-ratio: 16 / 9; overflow: hidden; }
    .game-image-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.2s; }
    .game:hover .game-image-container img { transform: scale(1.05); }
    .game-info { padding: 12px; }
    .game-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .game-name { font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 75%; }
    .game-fav-btn {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      color: rgba(255,255,255,0.3);
    }
    .game-fav-btn.active { color: var(--gold); }
    .game-category-tag {
      display: inline-block;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 20px;
      margin-bottom: 8px;
    }
    .game-stats-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .game-rating-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .game-stars { display: flex; gap: 3px; }
    .game-star {
      font-size: 14px;
      cursor: pointer;
      color: rgba(255,255,255,0.2);
    }
    .game-star.active { color: var(--gold); }
    .game-rating-text { font-size: 11px; color: var(--gold); font-weight: bold; }
    .game-play-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #3a5ec9);
      border: none;
      border-radius: 40px;
      padding: 8px;
      color: white;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
    }
    .game-play-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }

    .footer {
      text-align: center;
      padding: 30px;
      color: var(--text-dim);
      font-size: 12px;
    }
    .link { color: var(--accent); text-decoration: none; }

    /* Toast */
    .rating-toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      border: 1px solid var(--gold);
      border-radius: 30px;
      padding: 10px 20px;
      color: var(--gold);
      font-size: 13px;
      z-index: 10001;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .rating-toast.show { opacity: 1; }

    /* Daily Bonus Modal */
    .daily-bonus-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      z-index: 10002;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s;
    }
    .daily-bonus-overlay.show { opacity: 1; visibility: visible; }
    .daily-bonus-card {
      background: linear-gradient(135deg, #1e1e2e, #151520);
      border: 2px solid var(--gold);
      border-radius: 28px;
      padding: 30px;
      text-align: center;
      max-width: 380px;
    }
    .daily-reward { font-size: 48px; color: var(--gold); margin: 20px 0; }

    /* Settings button */
    .settings-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 30px;
      padding: 8px 20px;
      color: white;
      cursor: pointer;
    }
    .settings-btn:hover { background: var(--accent); }
  </style>
</head>
<body>

<div class="desktop" id="desktop">
  <div class="game-hub">

      <div class="coin-display">
        <span>🪙</span>

      <button class="game-of-day-play" id="gameOfDayPlay">Play Now →</button>

    <!-- Search -->
    <div class="search-section">
      <input type="text" id="searchInput" placeholder="search games...">

    <!-- Categories -->

    <!-- Sort -->
    <div class="sort-bar" id="sortBar"></div>

    <!-- Games Grid -->

    <!-- Footer -->
    <div class="footer">
      <span>a site created by abcatlmfao</span>
      <a class="link" href="https://dsc.gg/parcoil">parcoil network</a>
    </div>
  </div>
</div>

<!-- Taskbar (auto-hide) -->
<div class="taskbar" id="taskbar">
  <div class="start-btn" id="startBtn">🍥 fanterOS</div>
  <div class="taskbar-apps" id="taskbarApps"></div>

</div>

<!-- Start Menu -->
<div class="start-menu" id="startMenu">
  <div class="start-header">
    <div class="user-name" id="startUserName">Guest</div>
    <div class="user-status">🟢 playing games</div>

  <div class="start-search"><input type="text" id="startSearch" placeholder="Search..."></div>
  <div class="start-apps" id="startApps"></div>
</div>

<!-- Boot Menu (Ctrl+K) -->
<div class="boot-menu" id="bootMenu">
  <div class="boot-search"><input type="text" id="bootSearch" placeholder="Search games..." autocomplete="off"></div>
  <div class="boot-results" id="bootResults"></div>
  <div class="boot-footer"><span>↑↓ navigate</span><span>↵ play</span><span>esc close</span></div>
</div>

<!-- Daily Bonus -->
<div id="dailyBonusOverlay" class="daily-bonus-overlay">
  <div class="daily-bonus-card">
    <h2>🎁 DAILY REWARD!</h2>
    <div class="daily-reward" id="dailyRewardAmount">+0 🪙</div>
    <p>Come back tomorrow for more!</p>
    <div id="dailyStreakText">Streak: 0 days</div>
    <button class="settings-btn" id="claimDailyBtn" style="margin-top:20px;">Claim</button>
  </div>
</div>

<div class="rating-toast" id="ratingToast"></div>

<script>
  // ============================================================
  // FANTER OS - COMPLETE (all original features + OS desktop)
  // ============================================================

  // --- Supabase Init ---
  const SUPABASE_URL = "https://gvzgnclowylrrpovdvtw.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2emduY2xvd3lscnJwb3ZkdnR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NjM5ODEsImV4cCI6MjA5MjAzOTk4MX0.p7oeYBVX870iSK-TLDRj6pfW7wLj7HJsTHjNWaNpL7o";
  window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // --- Global State ---
  let gamesData = [];
  let currentCategory = 'all';
  let currentSort = 'default';
  let userVotes = JSON.parse(localStorage.getItem('userVotes') || '{}');
  let globalRatings = {};
  let favourites = JSON.parse(localStorage.getItem('favourites') || '[]');
  let currentUser = JSON.parse(localStorage.getItem('fanter_currentUser') || 'null');
  let gamePlayCounts = JSON.parse(localStorage.getItem('gamePlayCounts') || '{}');
  let gameEarnings = JSON.parse(localStorage.getItem('gameEarnings') || '{}');

  // --- OS State ---
  let startMenuOpen = false;
  let bootMenuOpen = false;
  let currentBootResults = [];
  let selectedBootIndex = -1;

  // --- Helper Functions ---
  function showToast(msg) {
    const toast = document.getElementById('ratingToast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function updateUserDisplay() {
    const user = JSON.parse(localStorage.getItem('fanter_currentUser') || 'null');
    const nameSpan = document.getElementById('accountName');
    const startNameSpan = document.getElementById('startUserName');
    if (nameSpan) nameSpan.textContent = user ? (user.displayName || user.username || 'Guest') : 'Guest';
    if (startNameSpan) startNameSpan.textContent = user ? (user.displayName || user.username || 'Guest') : 'Guest';
    const coinEl = document.getElementById('coinAmount');
    if (coinEl && user) coinEl.textContent = Math.floor((user.coins || 0) * 100) / 100;
  }

  function updateClock() {
    const now = new Date();
    document.getElementById('taskbarTime').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  // --- Taskbar auto-hide ---
  let taskbarTimeout;
  const taskbar = document.getElementById('taskbar');
  function showTaskbar() { taskbar.classList.add('visible'); clearTimeout(taskbarTimeout); taskbarTimeout = setTimeout(() => taskbar.classList.remove('visible'), 2000); }
  document.addEventListener('mousemove', showTaskbar);
  showTaskbar();

  // --- Start Menu ---
  const APPS = [
    { id: 'games', name: 'Game Hub', icon: '🎮', desc: 'Browse all games' },
    { id: 'shop', name: 'Item Shop', icon: '🛒', desc: 'Buy themes & pets' },
    { id: 'settings', name: 'Settings', icon: '⚙️', desc: 'Customize' },
    { id: 'account', name: 'My Account', icon: '👤', desc: 'Profile & achievements' },
    { id: 'fantarena', name: 'Fantarena', icon: '🏟️', desc: 'Chat with friends' }
  ];

  function renderStartApps(search = '') {
    const container = document.getElementById('startApps');
    let filtered = APPS;
    if (search) filtered = APPS.filter(a => a.name.toLowerCase().includes(search.toLowerCase()));
    container.innerHTML = filtered.map(app => `
      <div class="start-app" data-app="${app.id}">
        <div class="start-app-icon">${app.icon}</div>
        <div class="start-app-name">${app.name}</div>
        <div class="start-app-desc">${app.desc}</div>
      </div>
    `).join('');
    container.querySelectorAll('.start-app').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.app;
        const urls = { games: '#', shop: 'shop.html', settings: 'settings.html', account: 'fantaccount.html', fantarena: 'fantarena.html' };
        if (urls[id]) window.location.href = urls[id];
        toggleStartMenu();
      });
    });
  }

  function toggleStartMenu() {
    startMenuOpen = !startMenuOpen;
    document.getElementById('startMenu').classList.toggle('open', startMenuOpen);
    if (startMenuOpen) { document.getElementById('startSearch').focus(); renderStartApps(''); }
  }

  // --- Boot Menu (Ctrl+K) ---
  function updateBootResults(query) {
    const container = document.getElementById('bootResults');
    let results = query ? gamesData.filter(g => g.name.toLowerCase().includes(query.toLowerCase())).slice(0, 10) : gamesData.slice(0, 8);
    currentBootResults = results;
    selectedBootIndex = results.length > 0 ? 0 : -1;
    if (results.length === 0) { container.innerHTML = '<div style="padding: 20px; text-align: center; color: rgba(255,255,255,0.4);">no games found</div>'; return; }
    container.innerHTML = results.map((game, idx) => `
      <div class="boot-result ${idx === selectedBootIndex ? 'selected' : ''}" data-index="${idx}">
        <div class="boot-result-icon">🎮</div>
        <div class="boot-result-info"><div class="boot-result-name">${escapeHtml(game.name)}</div><div class="boot-result-desc">${game.category || 'game'}</div></div>
      </div>
    `).join('');
    container.querySelectorAll('.boot-result').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.index);
        const game = currentBootResults[idx];
        if (game) playGame(game);
        toggleBootMenu();
      });
    });
  }

  function toggleBootMenu() {
    bootMenuOpen = !bootMenuOpen;
    document.getElementById('bootMenu').classList.toggle('open', bootMenuOpen);
    if (bootMenuOpen) { document.getElementById('bootSearch').focus(); updateBootResults(''); }
  }

  // --- Game Functions ---
  function playGame(game) {
    if (game) {
      trackPlayedGame(game.name);
      window.open(`play.html?gameurl=${encodeURIComponent(game.url)}&game=${encodeURIComponent(game.name)}`, '_blank');
    }
  }

  function trackPlayedGame(name) {
    gamePlayCounts[name] = (gamePlayCounts[name] || 0) + 1;
    gameEarnings[name] = (gameEarnings[name] || 0) + 0.05;
    localStorage.setItem('gamePlayCounts', JSON.stringify(gamePlayCounts));
    localStorage.setItem('gameEarnings', JSON.stringify(gameEarnings));
    if (currentUser) {
      currentUser.coins = (currentUser.coins || 0) + 0.05;
      localStorage.setItem('fanter_currentUser', JSON.stringify(currentUser));
      updateUserDisplay();
    }
  }

  function getCategoryColor(c) {
    const colors = { action: '#ff4444', puzzle: '#44ff44', racing: '#ff8844', sports: '#44ff88', adventure: '#44aaff', platformer: '#ff44ff', strategy: '#88ff44', horror: '#aa44ff', arcade: '#ff44aa', simulation: '#44ffcc', sandbox: '#ff8844' };
    return colors[c] || '#aaaaaa';
  }

  function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]); }

  function submitRating(game, rating) {
    if (!globalRatings[game]) globalRatings[game] = { total: 0, count: 0, average: 0 };
    if (userVotes[game]) { globalRatings[game].total -= userVotes[game]; globalRatings[game].count--; }
    globalRatings[game].total += rating;
    globalRatings[game].count++;
    globalRatings[game].average = globalRatings[game].total / globalRatings[game].count;
    userVotes[game] = rating;
    localStorage.setItem('userVotes', JSON.stringify(userVotes));
    showToast(`Rated "${game}" ${rating}★!`);
    renderGames();
  }

  function toggleFavorite(game) {
    if (favourites.includes(game)) favourites = favourites.filter(f => f !== game);
    else favourites.push(game);
    localStorage.setItem('favourites', JSON.stringify(favourites));
    if (currentUser) {
      currentUser.favorites = favourites;
      localStorage.setItem('fanter_currentUser', JSON.stringify(currentUser));
    }
    renderGames();
  }

  // --- Render Games ---
  function renderGames() {
    const container = document.getElementById('gamesContainer');
    if (!container || !gamesData.length) return;
    let filtered = gamesData;
    if (currentCategory !== 'all') filtered = filtered.filter(g => g.category === currentCategory);
    if (currentSort === 'name-asc') filtered.sort((a, b) => a.name.localeCompare(b.name));
    else if (currentSort === 'name-desc') filtered.sort((a, b) => b.name.localeCompare(a.name));
    else if (currentSort === 'rating-desc') filtered.sort((a, b) => (globalRatings[b.name]?.average || 0) - (globalRatings[a.name]?.average || 0));
    container.innerHTML = filtered.map(game => {
      const rating = globalRatings[game.name]?.average || 0;
      const userRating = userVotes[game.name] || 0;
      const isFav = favourites.includes(game.name);
      const color = getCategoryColor(game.category);
      return `
        <div class="game" data-game="${escapeHtml(game.name)}">
          <div class="game-image-container"><img src="${game.image}" alt="${escapeHtml(game.name)}" loading="lazy"></div>
          <div class="game-info">
            <div class="game-title-row">
              <span class="game-name">${escapeHtml(game.name.length > 18 ? game.name.slice(0,16)+'...' : game.name)}</span>
              <button class="game-fav-btn ${isFav ? 'active' : ''}" data-fav="${escapeHtml(game.name)}">${isFav ? '★' : '☆'}</button>
            </div>
            <div class="game-category-tag" style="background:${color}20; color:${color}">${game.category || 'other'}</div>
            <div class="game-stats-row"><span>🎮 ${gamePlayCounts[game.name] || 0}</span><span>🪙 ${Math.floor((gameEarnings[game.name] || 0)*100)/100}</span></div>
            <div class="game-rating-row">
              <div class="game-stars">${[1,2,3,4,5].map(s => `<span class="game-star ${s <= userRating ? 'active' : ''}" data-star="${s}">★</span>`).join('')}</div>
              <span class="game-rating-text">${rating.toFixed(1)}</span>
            </div>
            <button class="game-play-btn" data-play="${escapeHtml(game.name)}">▶ play</button>
          </div>
        </div>
      `;
    }).join('');
    attachGameEvents();
  }

  function attachGameEvents() {
    document.querySelectorAll('.game-play-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const gameName = btn.dataset.play;
        const game = gamesData.find(g => g.name === gameName);
        if (game) playGame(game);
      });
    });
    document.querySelectorAll('.game-fav-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleFavorite(btn.dataset.fav);
      });
    });
    document.querySelectorAll('.game-star').forEach(star => {
      star.addEventListener('click', (e) => {
        e.stopPropagation();
        const gameCard = star.closest('.game');
        const gameName = gameCard.dataset.game;
        const rating = parseInt(star.dataset.star);
        submitRating(gameName, rating);
      });
    });
    document.querySelectorAll('.game').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.classList.contains('game-play-btn') || e.target.classList.contains('game-fav-btn') || e.target.classList.contains('game-star')) return;
        const gameName = card.dataset.game;
        const game = gamesData.find(g => g.name === gameName);
        if (game) showGameDetails(game);
      });
    });
  }

  function showGameDetails(game) {
    const rating = globalRatings[game.name]?.average || 0;
    const userRating = userVotes[game.name] || 0;
    const isFav = favourites.includes(game.name);
    const modalHtml = `
      <div id="gameDetailModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);backdrop-filter:blur(12px);z-index:20000;display:flex;align-items:center;justify-content:center;">
        <div style="background:#1e1e2e;border-radius:24px;max-width:500px;width:90%;padding:20px;border:1px solid var(--accent);">
          <img src="${game.image}" style="width:100%;border-radius:16px;margin-bottom:15px;">
          <h2 style="margin-bottom:10px;">${escapeHtml(game.name)}</h2>
          <div style="display:flex;gap:10px;margin-bottom:15px;">
            <div style="background:rgba(255,255,255,0.1);padding:5px 12px;border-radius:20px;">⭐ ${rating.toFixed(1)}</div>
            <div style="background:rgba(255,204,0,0.1);padding:5px 12px;border-radius:20px;">your: ${'★'.repeat(userRating)}${'☆'.repeat(5-userRating)}</div>
          </div>
          <div style="display:flex;gap:10px;margin-bottom:15px;">
            ${[1,2,3,4,5].map(s => `<span class="detail-star" data-star="${s}" style="font-size:32px;cursor:pointer;color:${s <= userRating ? '#ffcc00' : 'rgba(255,255,255,0.2)'}">★</span>`).join('')}
          </div>
          <div style="display:flex;gap:10px;">
            <button id="detailPlayBtn" style="flex:1;background:var(--accent);border:none;border-radius:30px;padding:10px;color:white;cursor:pointer;">🎮 Play</button>
            <button id="detailFavBtn" style="background:rgba(255,255,255,0.1);border:none;border-radius:30px;padding:10px 20px;cursor:pointer;">${isFav ? '★ Favorited' : '☆ Favorite'}</button>
            <button id="detailCloseBtn" style="background:rgba(255,255,255,0.1);border:none;border-radius:30px;padding:10px 20px;cursor:pointer;">✕</button>
          </div>
        </div>
      </div>
    `;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
    const modal = document.getElementById('gameDetailModal');
    document.querySelectorAll('.detail-star').forEach(star => {
      star.addEventListener('click', () => {
        const ratingVal = parseInt(star.dataset.star);
        submitRating(game.name, ratingVal);
        modal.remove();
        showGameDetails(game);
      });
    });
    document.getElementById('detailPlayBtn').onclick = () => { playGame(game); modal.remove(); };
    document.getElementById('detailFavBtn').onclick = () => { toggleFavorite(game.name); modal.remove(); showGameDetails(game); };
    document.getElementById('detailCloseBtn').onclick = () => modal.remove();
    modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
  }

  // --- Categories & Sort UI ---
  const categories = ['all', 'action', 'puzzle', 'racing', 'sports', 'adventure', 'platformer', 'strategy', 'horror', 'arcade', 'simulation', 'sandbox'];
  const categoryNames = { all: '🎮 All', action: '⚔️ Action', puzzle: '🧩 Puzzle', racing: '🏎️ Racing', sports: '⚽ Sports', adventure: '🗺️ Adventure', platformer: '🏃 Platformer', strategy: '♟️ Strategy', horror: '👻 Horror', arcade: '🕹️ Arcade', simulation: '🏭 Simulation', sandbox: '🎨 Sandbox' };
  const sorts = [{ id: 'default', label: 'Default' }, { id: 'name-asc', label: 'A-Z' }, { id: 'name-desc', label: 'Z-A' }, { id: 'rating-desc', label: 'Top Rated' }];

  function renderCategoryBar() {
    const container = document.getElementById('categoryBar');
    container.innerHTML = categories.map(cat => `<button class="cat-btn ${currentCategory === cat ? 'active' : ''}" data-cat="${cat}">${categoryNames[cat] || cat}</button>`).join('');
    container.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', () => { currentCategory = btn.dataset.cat; renderCategoryBar(); renderGames(); });
    });
  }

  function renderSortBar() {
    const container = document.getElementById('sortBar');
    container.innerHTML = sorts.map(s => `<button class="sort-btn ${currentSort === s.id ? 'active' : ''}" data-sort="${s.id}">${s.label}</button>`).join('');
    container.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => { currentSort = btn.dataset.sort; renderSortBar(); renderGames(); });
    });
  }

  // --- Daily Bonus ---
  function checkDailyBonus() {
    const lastClaim = localStorage.getItem('lastDailyClaim');
    const today = new Date().toDateString();
    if (lastClaim !== today) {
      const streak = parseInt(localStorage.getItem('dailyStreak') || '0');
      const reward = 50 + Math.min(streak, 7) * 10;
      document.getElementById('dailyRewardAmount').textContent = `+${reward} 🪙`;
      document.getElementById('dailyStreakText').textContent = `Streak: ${streak + 1} day${streak !== 0 ? 's' : ''}`;
      document.getElementById('dailyBonusOverlay').classList.add('show');
      window.pendingDailyReward = reward;
      window.pendingDailyStreak = streak + 1;
    }
  }

  document.getElementById('claimDailyBtn').onclick = () => {
    if (window.pendingDailyReward && currentUser) {
      currentUser.coins = (currentUser.coins || 0) + window.pendingDailyReward;
      localStorage.setItem('fanter_currentUser', JSON.stringify(currentUser));
      localStorage.setItem('lastDailyClaim', new Date().toDateString());
      localStorage.setItem('dailyStreak', window.pendingDailyStreak);
      updateUserDisplay();
      showToast(`+${window.pendingDailyReward} coins!`);
    }
    document.getElementById('dailyBonusOverlay').classList.remove('show');
    window.pendingDailyReward = null;
  };

  // --- Load Games ---
  async function loadGames() {
    try {
      const res = await fetch('./config/games.json');
      gamesData = await res.json();
      console.log(`✅ Loaded ${gamesData.length} games`);
      renderCategoryBar();
      renderSortBar();
      renderGames();
      checkDailyBonus();

      // Game of the Day
      const today = new Date().toDateString();
      let gotd = localStorage.getItem('gameOfDayDate') === today ? gamesData.find(g => g.name === localStorage.getItem('gameOfDay')) : null;
      if (!gotd) { gotd = gamesData[Math.floor(Math.random() * gamesData.length)]; localStorage.setItem('gameOfDay', gotd.name); localStorage.setItem('gameOfDayDate', today); }
      if (gotd) {
        document.getElementById('gameOfDayName').textContent = gotd.name;
        document.getElementById('gameOfDay').style.display = 'flex';
        document.getElementById('gameOfDayPlay').onclick = () => playGame(gotd);
      }
    } catch(e) { console.error('Failed to load games:', e); }
  }

  // --- Search ---
  document.getElementById('searchInput').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const container = document.getElementById('gamesContainer');
    if (!term) { renderGames(); return; }
    const filtered = gamesData.filter(g => g.name.toLowerCase().includes(term));
    container.innerHTML = filtered.map(game => `<div class="game" style="padding:20px;text-align:center;">🎮 ${escapeHtml(game.name)}<br><button class="game-play-btn" data-play="${escapeHtml(game.name)}" style="margin-top:10px;">play</button></div>`).join('');
    document.querySelectorAll('.game-play-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const game = gamesData.find(g => g.name === btn.dataset.play);
        if (game) playGame(game);
      });
    });
  });

  // --- Keyboard Shortcuts ---
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); toggleBootMenu(); }
    if (e.key === 'Escape') { if (bootMenuOpen) toggleBootMenu(); if (startMenuOpen) toggleStartMenu(); }
  });

  document.getElementById('startBtn').addEventListener('click', toggleStartMenu);
  document.getElementById('startSearch').addEventListener('input', (e) => renderStartApps(e.target.value));
  document.getElementById('bootSearch').addEventListener('input', (e) => updateBootResults(e.target.value));
  document.getElementById('bootSearch').addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown') { e.preventDefault(); if (selectedBootIndex < currentBootResults.length - 1) { selectedBootIndex++; updateBootResults(document.getElementById('bootSearch').value); } }
    else if (e.key === 'ArrowUp') { e.preventDefault(); if (selectedBootIndex > 0) { selectedBootIndex--; updateBootResults(document.getElementById('bootSearch').value); } }
    else if (e.key === 'Enter') { e.preventDefault(); if (currentBootResults[selectedBootIndex]) { playGame(currentBootResults[selectedBootIndex]); toggleBootMenu(); } }
  });

  document.addEventListener('click', (e) => {
    if (startMenuOpen && !e.target.closest('.start-menu') && !e.target.closest('.start-btn')) toggleStartMenu();
    if (bootMenuOpen && !e.target.closest('.boot-menu')) toggleBootMenu();
  });

  // --- Safety Key ---
  let lastKey = '', lastKeyTime = 0;
  document.addEventListener('keydown', (e) => {
    const safetyKey = localStorage.getItem('safetyKey');
    const safetyUrl = localStorage.getItem('safetyUrl');
    if (safetyKey && safetyUrl && e.key.toLowerCase() === safetyKey.toLowerCase() && e.key === lastKey && Date.now() - lastKeyTime < 1000) window.location.href = safetyUrl;
    lastKey = e.key; lastKeyTime = Date.now();
  });

  // --- Init ---
  setInterval(updateClock, 1000);
  setInterval(updateUserDisplay, 2000);
  updateUserDisplay();
  updateClock();
  loadGames();
</script>
</body>
</html>
