<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>fanterOS — desktop environment</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    :root {
      --bg-dark: #0c0c12;
      --bg-darker: #08080c;
      --panel-bg: rgba(20, 22, 36, 0.85);
      --window-bg: #1e1e2e;
      --window-header: #2a2a3a;
      --accent: #5e7ce6;
      --accent-hover: #7c9eff;
      --text: #eef2ff;
      --text-dim: #a0a8c0;
      --border: #2d2d44;
      --danger: #ff5e5e;
    }

    body {
      font-family: 'Segoe UI', 'Ubuntu', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a10;
      overflow: hidden;
      height: 100vh;
      color: var(--text);
    }

    /* Desktop */
    .desktop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      transition: background-image 0.3s ease;
    }
    .desktop.wallpaper-default { background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 50%, #0a0a12 100%); }
    .desktop.wallpaper-arch { background: linear-gradient(135deg, #1a3a6e 0%, #0a1a3a 100%); }
    .desktop.wallpaper-windows { background: linear-gradient(135deg, #2d5ae3 0%, #1a3a8a 100%); }
    .desktop.wallpaper-neon { background: radial-gradient(circle at 20% 40%, #1a0033, #0a001a); }
    .desktop.wallpaper-matrix { background: repeating-linear-gradient(0deg, rgba(0,255,0,0.03) 0px, rgba(0,255,0,0.03) 2px, transparent 2px, transparent 8px), #0a0a0a; }

    /* Desktop Icons */
    .desktop-icons {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
    }
    .desktop-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 80px;
      padding: 8px 4px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      background: rgba(255,255,255,0);
    }
    .desktop-icon:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); }
    .desktop-icon:active { transform: translateY(0); }
    .desktop-icon .icon { font-size: 32px; margin-bottom: 6px; }
    .desktop-icon .label { font-size: 11px; text-align: center; color: rgba(255,255,255,0.85); text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

    /* Taskbar */
    .taskbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      z-index: 1000;
      font-size: 13px;
    }
    .start-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: var(--accent);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-weight: 600;
    }
    .start-btn:hover { background: var(--accent-hover); transform: scale(1.02); }
    .taskbar-apps {
      display: flex;
      gap: 4px;
      flex: 1;
      margin-left: 16px;
      overflow-x: auto;
    }
    .taskbar-app {
      padding: 6px 14px;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }
    .taskbar-app:hover { background: rgba(255,255,255,0.12); }
    .taskbar-app.active { background: var(--accent); }
    .taskbar-time { padding: 0 12px; color: var(--text-dim); font-family: monospace; font-size: 12px; }

    /* Start Menu */
    .start-menu {
      position: fixed;
      bottom: 56px;
      left: 12px;
      width: 320px;
      background: rgba(28, 30, 45, 0.98);
      backdrop-filter: blur(20px);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      z-index: 1001;
      transform: translateY(10px);
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s ease;
      overflow: hidden;
    }
    .start-menu.open { transform: translateY(0); opacity: 1; visibility: visible; }
    .start-header { padding: 16px; background: linear-gradient(135deg, var(--accent), #4a5ec9); color: white; }
    .start-header .user-name { font-weight: 600; font-size: 14px; }
    .start-header .user-status { font-size: 11px; opacity: 0.8; }
    .start-search { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .start-search input {
      width: 100%;
      padding: 8px 12px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: white;
      font-size: 13px;
      outline: none;
    }
    .start-search input:focus { border-color: var(--accent); }
    .start-apps { max-height: 400px; overflow-y: auto; padding: 8px; }
    .start-app {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
    }
    .start-app:hover { background: rgba(255,255,255,0.08); }
    .start-app-icon { font-size: 20px; width: 32px; text-align: center; }
    .start-app-name { font-size: 13px; }
    .start-app-desc { font-size: 10px; color: var(--text-dim); margin-left: auto; }

    /* Boot Menu (Ctrl+K) */
    .boot-menu {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translate(-50%, -30%);
      width: 500px;
      max-width: 90vw;
      background: rgba(20, 22, 36, 0.98);
      backdrop-filter: blur(24px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.15);
      z-index: 10000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s ease;
      box-shadow: 0 24px 48px rgba(0,0,0,0.4);
    }
    .boot-menu.open { opacity: 1; visibility: visible; transform: translate(-50%, 0); }
    .boot-search { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .boot-search input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: white;
      font-size: 16px;
      outline: none;
    }
    .boot-search input:focus { border-color: var(--accent); }
    .boot-results { max-height: 400px; overflow-y: auto; padding: 12px; }
    .boot-result {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
    }
    .boot-result.selected { background: var(--accent); }
    .boot-result:hover:not(.selected) { background: rgba(255,255,255,0.08); }
    .boot-result-icon { font-size: 24px; }
    .boot-result-info { flex: 1; }
    .boot-result-name { font-weight: 500; }
    .boot-result-desc { font-size: 11px; color: var(--text-dim); }
    .boot-result-shortcut { font-size: 10px; color: var(--text-dim); font-family: monospace; }
    .boot-footer {
      padding: 10px 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      display: flex;
      justify-content: space-between;
    }

    /* Window */
    .window {
      position: absolute;
      min-width: 400px;
      min-height: 300px;
      background: var(--window-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 100;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .window.active { z-index: 200; box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 2px var(--accent); }
    .window.minimized { transform: scale(0) !important; opacity: 0; pointer-events: none; }
    .window.maximized {
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: calc(100% - 48px) !important;
      border-radius: 0;
    }
    .window-header {
      padding: 10px 12px;
      background: var(--window-header);
      cursor: move;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .window-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; }
    .window-controls { display: flex; gap: 8px; }
    .window-control {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      background: transparent;
      border: none;
      color: var(--text-dim);
    }
    .window-control:hover { background: rgba(255,255,255,0.1); }
    .window-control.close:hover { background: var(--danger); color: white; }
    .window-content { flex: 1; overflow: hidden; background: #151520; }
    .window-content iframe { width: 100%; height: 100%; border: none; background: white; }
    .resize-handle {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 16px;
      height: 16px;
      cursor: nw-resize;
      background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.1) 50%);
      z-index: 10;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
  </style>
</head>
<body>

<div class="desktop wallpaper-default" id="desktop"></div>

<div class="desktop-icons" id="desktopIcons"></div>

<div class="taskbar">
  <div class="start-btn" id="startBtn"><span>🍥</span><span>fanterOS</span></div>
  <div class="taskbar-apps" id="taskbarApps"></div>
  <div class="taskbar-time" id="taskbarTime">--:--</div>
</div>

<div class="start-menu" id="startMenu">
  <div class="start-header">
    <div class="user-name" id="userName">Guest</div>
    <div class="user-status">🟢 online</div>
  </div>
  <div class="start-search"><input type="text" id="startSearch" placeholder="Search apps..."></div>
  <div class="start-apps" id="startApps"></div>
</div>

<div class="boot-menu" id="bootMenu">
  <div class="boot-search"><input type="text" id="bootSearch" placeholder="Search apps, games..." autocomplete="off"></div>
  <div class="boot-results" id="bootResults"></div>
  <div class="boot-footer"><span>↑↓ navigate</span><span>↵ open</span><span>esc close</span></div>
</div>

<script>
  // ============================================================
  // FANTER OS — Desktop Environment (replaces index.html)
  // ============================================================
  
  const APPS = [
    { id: 'games', name: 'Game Hub', icon: '🎮', url: 'index.html', desc: 'Browse and play games', category: 'games' },
    { id: 'shop', name: 'Item Shop', icon: '🛒', url: 'shop.html', desc: 'Buy themes, pets, cursors', category: 'store' },
    { id: 'settings', name: 'Settings', icon: '⚙️', url: 'settings.html', desc: 'Customize your OS', category: 'system' },
    { id: 'fantarena', name: 'Fantarena', icon: '🏟️', url: 'fantarena.html', desc: 'Chat with friends', category: 'social' },
    { id: 'account', name: 'My Account', icon: '👤', url: 'fantaccount.html', desc: 'Manage profile', category: 'system' },
    { id: 'fanterai', name: 'Fanter AI', icon: '🤖', url: 'https://chipikipal800.github.io/fanter.ai/', desc: 'AI assistant', category: 'ai', external: true },
    { id: 'fanterstudios', name: 'Fanter Studios', icon: '🎨', url: 'https://chipikipal800.github.io/fanter-studios/', desc: 'Create games', category: 'create', external: true },
    { id: 'fantersearch', name: 'Fanter Search', icon: '🔍', url: 'https://chipikipal800.github.io/Fanter-search/', desc: 'Proxy browser', category: 'tools', external: true },
    { id: 'fanterclicker', name: 'Fanter Clicker', icon: '🍪', url: 'https://chipikipal800.github.io/Fanter-Clicker/', desc: 'Clicker game', category: 'games', external: true }
  ];

  const DESKTOP_ICONS = [
    { id: 'games', icon: '🎮', label: 'Games' },
    { id: 'shop', icon: '🛒', label: 'Shop' },
    { id: 'settings', icon: '⚙️', label: 'Settings' },
    { id: 'fantarena', icon: '🏟️', label: 'Chat' }
  ];

  let windows = [];
  let nextWindowId = 1;
  let activeWindowId = null;
  let startMenuOpen = false;
  let bootMenuOpen = false;
  let currentBootResults = [];
  let selectedBootIndex = 0;
  
  let dragWindow = null;
  let dragOffsetX = 0, dragOffsetY = 0;
  let resizeWindow = null;
  let resizeStartX = 0, resizeStartY = 0;
  let resizeStartW = 0, resizeStartH = 0;

  function getCurrentUser() {
    try {
      const user = JSON.parse(localStorage.getItem('fanter_currentUser') || 'null');
      return user || { username: 'Guest', displayName: 'Guest', coins: 0 };
    } catch(e) { return { username: 'Guest', displayName: 'Guest', coins: 0 }; }
  }

  function updateUserDisplay() {
    const user = getCurrentUser();
    document.getElementById('userName').textContent = user.displayName || user.username || 'Guest';
  }

  function updateClock() {
    const now = new Date();
    document.getElementById('taskbarTime').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function focusWindow(id) {
    activeWindowId = id;
    windows.forEach(win => {
      win.element.classList.remove('active');
      if (win.id === id) {
        win.element.classList.add('active');
        win.element.style.zIndex = 100 + windows.findIndex(w => w.id === id);
      }
    });
    updateTaskbar();
  }

  function toggleMinimize(id) {
    const win = windows.find(w => w.id === id);
    if (win) {
      win.minimized = !win.minimized;
      win.element.classList.toggle('minimized', win.minimized);
      if (win.minimized && activeWindowId === id) {
        const nextWin = windows.find(w => !w.minimized && w.id !== id);
        if (nextWin) focusWindow(nextWin.id);
        else activeWindowId = null;
      } else if (!win.minimized) focusWindow(id);
      updateTaskbar();
    }
  }

  function toggleMaximize(id) {
    const win = windows.find(w => w.id === id);
    if (win) {
      if (win.maximized) {
        win.element.classList.remove('maximized');
        win.element.style.width = `${win.w}px`;
        win.element.style.height = `${win.h}px`;
        win.element.style.left = `${win.x}px`;
        win.element.style.top = `${win.y}px`;
        win.maximized = false;
      } else {
        win.w = parseInt(win.element.style.width);
        win.h = parseInt(win.element.style.height);
        win.x = parseInt(win.element.style.left);
        win.y = parseInt(win.element.style.top);
        win.element.classList.add('maximized');
        win.maximized = true;
      }
      updateTaskbar();
    }
  }

  function closeWindow(id) {
    const win = windows.find(w => w.id === id);
    if (win) {
      win.element.remove();
      windows = windows.filter(w => w.id !== id);
      if (activeWindowId === id) {
        const nextWin = windows.find(w => !w.minimized);
        if (nextWin) focusWindow(nextWin.id);
        else activeWindowId = null;
      }
      updateTaskbar();
    }
  }

  function setupWindowEvents(win, id) {
    const header = win.querySelector('.window-header');
    const resizeHandle = win.querySelector('.resize-handle');
    const minimizeBtn = win.querySelector('[data-action="minimize"]');
    const maximizeBtn = win.querySelector('[data-action="maximize"]');
    const closeBtn = win.querySelector('[data-action="close"]');
    
    win.addEventListener('mousedown', (e) => {
      if (e.target === resizeHandle || e.target.closest('.resize-handle')) return;
      focusWindow(id);
    });
    
    let dragStart = null;
    header.addEventListener('mousedown', (e) => {
      if (e.target.closest('.window-controls')) return;
      dragStart = { x: e.clientX, y: e.clientY, left: parseInt(win.style.left), top: parseInt(win.style.top) };
      document.addEventListener('mousemove', onDrag);
      document.addEventListener('mouseup', stopDrag);
    });
    
    function onDrag(e) {
      if (!dragStart) return;
      const dx = e.clientX - dragStart.x;
      const dy = e.clientY - dragStart.y;
      win.style.left = `${dragStart.left + dx}px`;
      win.style.top = `${dragStart.top + dy}px`;
      const wData = windows.find(w => w.id === id);
      if (wData && !wData.maximized) {
        wData.x = dragStart.left + dx;
        wData.y = dragStart.top + dy;
      }
    }
    
    function stopDrag() {
      dragStart = null;
      document.removeEventListener('mousemove', onDrag);
      document.removeEventListener('mouseup', stopDrag);
    }
    
    let resizeActive = false;
    resizeHandle.addEventListener('mousedown', (e) => {
      e.stopPropagation();
      resizeActive = true;
      resizeWindow = id;
      resizeStartX = e.clientX;
      resizeStartY = e.clientY;
      const wData = windows.find(w => w.id === id);
      if (wData) {
        resizeStartW = wData.w;
        resizeStartH = wData.h;
      }
      document.addEventListener('mousemove', onResize);
      document.addEventListener('mouseup', stopResize);
    });
    
    function onResize(e) {
      if (!resizeActive) return;
      const dx = e.clientX - resizeStartX;
      const dy = e.clientY - resizeStartY;
      const newW = Math.max(400, resizeStartW + dx);
      const newH = Math.max(300, resizeStartH + dy);
      win.style.width = `${newW}px`;
      win.style.height = `${newH}px`;
      const wData = windows.find(w => w.id === resizeWindow);
      if (wData && !wData.maximized) {
        wData.w = newW;
        wData.h = newH;
      }
    }
    
    function stopResize() {
      resizeActive = false;
      resizeWindow = null;
      document.removeEventListener('mousemove', onResize);
      document.removeEventListener('mouseup', stopResize);
    }
    
    minimizeBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleMinimize(id); });
    maximizeBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleMaximize(id); });
    closeBtn.addEventListener('click', (e) => { e.stopPropagation(); closeWindow(id); });
  }

  function createWindow(app, x = 100, y = 80, w = 800, h = 600) {
    const id = nextWindowId++;
    const isExternal = app.external;
    const url = app.url;
    
    const win = document.createElement('div');
    win.className = 'window';
    win.id = `window-${id}`;
    win.style.left = `${x}px`;
    win.style.top = `${y}px`;
    win.style.width = `${w}px`;
    win.style.height = `${h}px`;
    
    win.innerHTML = `
      <div class="window-header">
        <div class="window-title"><span>${app.icon}</span><span>${app.name}</span></div>
        <div class="window-controls">
          <button class="window-control minimize" data-action="minimize">─</button>
          <button class="window-control maximize" data-action="maximize">□</button>
          <button class="window-control close" data-action="close">✕</button>
        </div>
      </div>
      <div class="window-content"><iframe src="${url}" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation"></iframe></div>
      <div class="resize-handle"></div>
    `;
    
    document.body.appendChild(win);
    
    windows.push({ id, element: win, app, minimized: false, maximized: false, x, y, w, h });
    focusWindow(id);
    setupWindowEvents(win, id);
    updateTaskbar();
    return id;
  }

  function updateTaskbar() {
    const container = document.getElementById('taskbarApps');
    container.innerHTML = windows.map(win => `
      <div class="taskbar-app ${activeWindowId === win.id ? 'active' : ''}" data-id="${win.id}">
        <span>${win.app.icon}</span><span>${win.app.name}</span>
      </div>
    `).join('');
    container.querySelectorAll('.taskbar-app').forEach(el => {
      el.addEventListener('click', () => {
        const id = parseInt(el.dataset.id);
        const win = windows.find(w => w.id === id);
        if (win) {
          if (win.minimized) toggleMinimize(id);
          else focusWindow(id);
        }
      });
    });
  }

  function renderDesktopIcons() {
    const container = document.getElementById('desktopIcons');
    container.innerHTML = DESKTOP_ICONS.map(icon => {
      const app = APPS.find(a => a.id === icon.id);
      return `<div class="desktop-icon" data-app-id="${icon.id}"><div class="icon">${icon.icon}</div><div class="label">${icon.label}</div></div>`;
    }).join('');
    container.querySelectorAll('.desktop-icon').forEach(el => {
      el.addEventListener('dblclick', () => {
        const appId = el.dataset.appId;
        const app = APPS.find(a => a.id === appId);
        if (app) {
          const existing = windows.find(w => w.app.id === appId);
          if (existing) {
            if (existing.minimized) toggleMinimize(existing.id);
            focusWindow(existing.id);
          } else { createWindow(app); }
        }
      });
    });
  }

  function renderStartApps(searchTerm = '') {
    const container = document.getElementById('startApps');
    let filtered = APPS;
    if (searchTerm) filtered = APPS.filter(a => a.name.toLowerCase().includes(searchTerm.toLowerCase()));
    container.innerHTML = filtered.map(app => `
      <div class="start-app" data-app-id="${app.id}">
        <div class="start-app-icon">${app.icon}</div>
        <div class="start-app-name">${app.name}</div>
        <div class="start-app-desc">${app.desc}</div>
      </div>
    `).join('');
    container.querySelectorAll('.start-app').forEach(el => {
      el.addEventListener('click', () => {
        const appId = el.dataset.appId;
        const app = APPS.find(a => a.id === appId);
        if (app) {
          const existing = windows.find(w => w.app.id === appId);
          if (existing) {
            if (existing.minimized) toggleMinimize(existing.id);
            focusWindow(existing.id);
          } else { createWindow(app); }
          toggleStartMenu();
        }
      });
    });
  }

  function toggleStartMenu() {
    startMenuOpen = !startMenuOpen;
    const menu = document.getElementById('startMenu');
    menu.classList.toggle('open', startMenuOpen);
    if (startMenuOpen) {
      document.getElementById('startSearch').focus();
      renderStartApps('');
    }
  }

  function updateBootResults(query) {
    const container = document.getElementById('bootResults');
    let results = query ? APPS.filter(a => a.name.toLowerCase().includes(query.toLowerCase()) || a.desc.toLowerCase().includes(query.toLowerCase())).slice(0, 10) : APPS.slice(0, 8);
    currentBootResults = results;
    selectedBootIndex = results.length > 0 ? 0 : -1;
    if (results.length === 0) {
      container.innerHTML = '<div style="padding: 20px; text-align: center; color: rgba(255,255,255,0.4);">no results found</div>';
      return;
    }
    container.innerHTML = results.map((app, idx) => `
      <div class="boot-result ${idx === selectedBootIndex ? 'selected' : ''}" data-index="${idx}">
        <div class="boot-result-icon">${app.icon}</div>
        <div class="boot-result-info"><div class="boot-result-name">${app.name}</div><div class="boot-result-desc">${app.desc}</div></div>
        <div class="boot-result-shortcut">↵</div>
      </div>
    `).join('');
    container.querySelectorAll('.boot-result').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.index);
        const app = currentBootResults[idx];
        if (app) {
          const existing = windows.find(w => w.app.id === app.id);
          if (existing) {
            if (existing.minimized) toggleMinimize(existing.id);
            focusWindow(existing.id);
          } else { createWindow(app); }
          toggleBootMenu();
        }
      });
    });
  }

  function toggleBootMenu() {
    bootMenuOpen = !bootMenuOpen;
    const menu = document.getElementById('bootMenu');
    menu.classList.toggle('open', bootMenuOpen);
    if (bootMenuOpen) {
      document.getElementById('bootSearch').value = '';
      document.getElementById('bootSearch').focus();
      updateBootResults('');
      selectedBootIndex = -1;
    }
  }

  function setWallpaper(type) {
    const desktop = document.getElementById('desktop');
    desktop.className = 'desktop';
    desktop.classList.add(`wallpaper-${type}`);
    localStorage.setItem('fanter_wallpaper', type);
  }

  function loadWallpaper() {
    const saved = localStorage.getItem('fanter_wallpaper') || 'default';
    setWallpaper(saved);
  }

  // Event listeners
  document.getElementById('startBtn').addEventListener('click', toggleStartMenu);
  document.getElementById('startSearch').addEventListener('input', (e) => renderStartApps(e.target.value));
  document.getElementById('bootSearch').addEventListener('input', (e) => updateBootResults(e.target.value));
  document.getElementById('bootSearch').addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (selectedBootIndex < currentBootResults.length - 1) {
        selectedBootIndex++;
        updateBootResults(document.getElementById('bootSearch').value);
      }
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (selectedBootIndex > 0) {
        selectedBootIndex--;
        updateBootResults(document.getElementById('bootSearch').value);
      }
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (selectedBootIndex >= 0 && currentBootResults[selectedBootIndex]) {
        const app = currentBootResults[selectedBootIndex];
        const existing = windows.find(w => w.app.id === app.id);
        if (existing) {
          if (existing.minimized) toggleMinimize(existing.id);
          focusWindow(existing.id);
        } else { createWindow(app); }
        toggleBootMenu();
      }
    }
  });

  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); toggleBootMenu(); }
    if (e.key === 'Escape') {
      if (bootMenuOpen) toggleBootMenu();
      if (startMenuOpen) toggleStartMenu();
    }
  });

  document.addEventListener('click', (e) => {
    if (startMenuOpen && !e.target.closest('.start-menu') && !e.target.closest('.start-btn')) toggleStartMenu();
    if (bootMenuOpen && !e.target.closest('.boot-menu')) toggleBootMenu();
  });

  // Init
  function init() {
    updateUserDisplay();
    updateClock();
    setInterval(updateClock, 1000);
    setInterval(updateUserDisplay, 5000);
    renderDesktopIcons();
    loadWallpaper();
    setTimeout(() => {
      const gamesApp = APPS.find(a => a.id === 'games');
      if (gamesApp) createWindow(gamesApp, 60, 50, 1000, 700);
    }, 300);
    console.log('✅ fanterOS Desktop ready! Ctrl+K to search');
  }
  init();
</script>
</body>
</html>
