<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fanterOS - Simple Working Version</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(135deg, #1a1a2e, #0a0a0f);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      color: white;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      text-align: center;
      padding: 20px;
      font-size: 48px;
      background: linear-gradient(135deg, #fff, #7c5cff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .search-bar {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 20px auto;
      flex-wrap: wrap;
    }
    .search-bar input {
      width: 300px;
      padding: 12px 20px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3);
      color: white;
      font-size: 14px;
    }
    .search-bar select, .search-bar button {
      padding: 12px 20px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3);
      color: white;
      cursor: pointer;
    }
    .search-bar button {
      background: #7c5cff;
      border: none;
    }
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .game-card {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .game-card:hover {
      transform: translateY(-5px);
      border-color: #7c5cff;
      background: rgba(255,255,255,0.1);
    }
    .game-card img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
    }
    .game-card-info {
      padding: 12px;
    }
    .game-card-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .game-card-category {
      font-size: 11px;
      color: #a0a0c0;
      margin-top: 4px;
    }
    .footer {
      text-align: center;
      padding: 30px;
      color: #606080;
      font-size: 12px;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(12px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.show {
      display: flex;
    }
    .modal-content {
      background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
      border-radius: 24px;
      width: 90%;
      max-width: 800px;
      max-height: 85vh;
      overflow-y: auto;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .modal-header {
      position: relative;
      height: 200px;
      overflow: hidden;
    }
    .modal-header img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .modal-header .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
    }
    .modal-header h2 {
      font-size: 28px;
    }
    .modal-body {
      padding: 24px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }
    .modal-left {
      flex: 2;
    }
    .modal-right {
      flex: 1;
    }
    .modal-description {
      color: #a0a0c0;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .modal-info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .play-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #7c5cff, #5a3cc9);
      border: none;
      border-radius: 40px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
    }
    .close-modal {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.5);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 18px;
      cursor: pointer;
      color: white;
      z-index: 10;
    }
    .close-modal:hover {
      background: #ff5e5e;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #a0a0c0;
    }
    @media (max-width: 768px) {
      .games-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
      .modal-body {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🎮 fanterOS</h1>
  <p style="text-align: center; color: #a0a0c0; margin-bottom: 20px;">unblocked games hub</p>
  
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search games...">
    <select id="categorySelect">
      <option value="all">All Games</option>
      <option value="action">Action</option>
      <option value="platformer">Platformer</option>
      <option value="adventure">Adventure</option>
      <option value="horror">Horror</option>
      <option value="arcade">Arcade</option>
      <option value="racing">Racing</option>
      <option value="puzzle">Puzzle</option>
    </select>
    <button id="randomBtn">🎲 Random Game</button>
  </div>
  
  <div id="gamesGrid" class="games-grid">
    <div class="loading">Loading games...</div>
  </div>
  
  <div class="footer">
    a site created by abcatlmfao · parcoil network
  </div>
</div>

<div id="gameModal" class="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
// ============================================
// SIMPLE WORKING GAME HUB - NO OS SKIN YET
// ============================================

let gamesData = [];
let currentGame = null;

// Load games from JSON
async function loadGames() {
  try {
    const response = await fetch('./config/games.json');
    let text = await response.text();
    // Fix common JSON issues
    text = text.replace(/,(\s*}\s*)\]/g, '$1]').replace(/,\s*\]/, ']');
    gamesData = JSON.parse(text);
    console.log(`Loaded ${gamesData.length} games`);
    renderGames();
  } catch (error) {
    console.error('Error loading games:', error);
    document.getElementById('gamesGrid').innerHTML = '<div class="loading">⚠️ Error loading games. Make sure config/games.json exists.</div>';
    // Fallback demo games
    gamesData = [
      { name: "Demo Game 1", image: "https://via.placeholder.com/300x200?text=Game+1", url: "#", category: "action", desc: "Demo game 1 description", developer: "Fanter", releaseDate: "2024" },
      { name: "Demo Game 2", image: "https://via.placeholder.com/300x200?text=Game+2", url: "#", category: "platformer", desc: "Demo game 2 description", developer: "Fanter", releaseDate: "2024" }
    ];
    renderGames();
  }
}

// Render games grid
function renderGames() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  const category = document.getElementById('categorySelect').value;
  
  let filtered = gamesData.filter(game => {
    const matchesSearch = game.name.toLowerCase().includes(searchTerm);
    const matchesCategory = category === 'all' || game.category === category;
    return matchesSearch && matchesCategory;
  });
  
  const container = document.getElementById('gamesGrid');
  
  if (filtered.length === 0) {
    container.innerHTML = '<div class="loading">No games found 😔</div>';
    return;
  }
  
  container.innerHTML = filtered.map(game => `
    <div class="game-card" data-game='${JSON.stringify(game)}'>
      <img src="${game.image}" alt="${game.name}" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
      <div class="game-card-info">
        <div class="game-card-title">${game.name}</div>
        <div class="game-card-category">${game.category || 'game'}</div>
      </div>
    </div>
  `).join('');
  
  // Add click handlers
  document.querySelectorAll('.game-card').forEach(card => {
    card.addEventListener('click', () => {
      const game = JSON.parse(card.dataset.game);
      showGameModal(game);
    });
  });
}

// Show game details modal
function showGameModal(game) {
  currentGame = game;
  const modal = document.getElementById('gameModal');
  const content = document.getElementById('modalContent');
  
  content.innerHTML = `
    <div style="position: relative;">
      <button class="close-modal" onclick="document.getElementById('gameModal').classList.remove('show')">✕</button>
      <div class="modal-header">
        <img src="${game.image}" alt="${game.name}" onerror="this.src='https://via.placeholder.com/800x200?text=No+Image'">
        <div class="overlay">
          <h2>${game.name}</h2>
          <span style="display: inline-block; padding: 4px 12px; background: #7c5cff; border-radius: 20px; font-size: 12px; margin-top: 8px;">${game.category || 'game'}</span>
        </div>
      </div>
      <div class="modal-body">
        <div class="modal-left">
          <div class="modal-description">${game.desc || 'No description available.'}</div>
          <button class="play-btn" id="playNowBtn">🎮 PLAY NOW</button>
        </div>
        <div class="modal-right">
          <div class="modal-info-row"><span>Developer</span><span>${game.developer || 'Unknown'}</span></div>
          <div class="modal-info-row"><span>Release Date</span><span>${game.releaseDate || 'Unknown'}</span></div>
          <div class="modal-info-row"><span>Category</span><span>${game.category || 'game'}</span></div>
        </div>
      </div>
    </div>
  `;
  
  modal.classList.add('show');
  
  document.getElementById('playNowBtn').onclick = () => {
    window.location.href = game.url;
    modal.classList.remove('show');
  };
}

// Random game
document.getElementById('randomBtn').onclick = () => {
  if (gamesData.length) {
    const random = gamesData[Math.floor(Math.random() * gamesData.length)];
    showGameModal(random);
  }
};

// Search and filter
document.getElementById('searchInput').addEventListener('input', renderGames);
document.getElementById('categorySelect').addEventListener('change', renderGames);

// Start
loadGames();
</script>
</body>
</html>
